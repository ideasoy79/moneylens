<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MoneyLens · 돈 벌 생각</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://unpkg.com/lucide@latest/dist/umd/lucide.min.js"></script>

<!-- Firebase compat (non-module, global scope) -->
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>

<style>
*, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

:root {
  --bg:       #F4F6FA;
  --surface:  #FFFFFF;
  --surface2: #F8F9FC;
  --border:   #ECEEF4;
  --border2:  #DDE0EB;

  --text:     #0F1117;
  --text2:    #5A607A;
  --text3:    #9BA3BF;

  --green:    #05C072;
  --green2:   #03A861;
  --green-bg: #EDFBF4;
  --green-mid:rgba(5,192,114,0.18);

  --indigo:   #4F6EF7;
  --indigo-bg:#EEF1FE;

  --amber:    #F59E0B;
  --amber-bg: #FFFBEB;

  --danger:   #EF4444;
  --danger-bg:#FEF2F2;

  --radius:   18px;
  --radius-sm:12px;
  --radius-xs:8px;

  --shadow-sm: 0 1px 4px rgba(15,17,23,0.06);
  --shadow:    0 4px 16px rgba(15,17,23,0.08);
  --shadow-md: 0 8px 32px rgba(15,17,23,0.10);
}

html, body {
  height: 100%;
  font-family: 'Pretendard', -apple-system, BlinkMacSystemFont, sans-serif;
  background: var(--bg);
  color: var(--text);
  font-size: 15px;
  -webkit-font-smoothing: antialiased;
  overflow: hidden;
}

/* ── SCREENS ─────────────────────────────────── */
.screen { display: none; height: 100vh; }
.screen.active { display: flex; flex-direction: column; }

/* ── ONBOARDING ──────────────────────────────── */
#onboardingScreen {
  background: var(--surface);
  align-items: center;
  justify-content: space-between;
}

.ob-body {
  flex: 1;
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  padding: 48px 32px 24px;
  text-align: center;
  width: 100%;
}

.ob-icon-wrap {
  width: 100px; height: 100px;
  border-radius: 28px;
  background: var(--green-bg);
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 36px;
  box-shadow: 0 8px 32px rgba(5,192,114,0.2);
}

.ob-icon-wrap svg { width: 48px; height: 48px; stroke: var(--green); }

.ob-title {
  font-size: 28px; font-weight: 800;
  line-height: 1.3; letter-spacing: -0.5px;
  color: var(--text); margin-bottom: 14px;
}

.ob-desc {
  font-size: 15px; color: var(--text2);
  line-height: 1.75; max-width: 300px;
}

.ob-footer { width: 100%; padding: 0 24px 48px; }

.ob-dots {
  display: flex; gap: 6px;
  justify-content: center; margin-bottom: 28px;
}
.ob-dot {
  height: 6px; border-radius: 3px;
  background: var(--border2); transition: all 0.35s cubic-bezier(.4,0,.2,1);
  width: 6px;
}
.ob-dot.active { width: 22px; background: var(--green); }

#obNextBtn {
  width: 100%; padding: 16px;
  background: var(--green); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 16px; font-weight: 700; font-family: inherit;
  cursor: pointer; margin-bottom: 14px;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: -0.2px;
}
#obNextBtn:active { transform: scale(0.98); background: var(--green2); }

#obSkip {
  display: block; text-align: center;
  background: none; border: none;
  color: var(--text3); font-size: 14px;
  font-family: inherit; cursor: pointer; padding: 6px;
  width: 100%;
}

/* ── AUTH ────────────────────────────────────── */
#authScreen {
  background: var(--surface);
  overflow-y: auto;
}

.auth-wrap {
  padding: 52px 24px 40px;
  width: 100%; max-width: 420px;
  margin: 0 auto;
}

.auth-logo-wrap {
  display: flex; align-items: center; gap: 10px;
  margin-bottom: 8px;
}
.auth-logo-icon {
  width: 40px; height: 40px; border-radius: 12px;
  background: var(--green-bg);
  display: flex; align-items: center; justify-content: center;
}
.auth-logo-icon svg { width: 22px; height: 22px; stroke: var(--green); }
.auth-brand { font-size: 20px; font-weight: 800; color: var(--green); letter-spacing: -0.3px; }

.auth-heading { font-size: 26px; font-weight: 800; color: var(--text); letter-spacing: -0.5px; margin-bottom: 6px; margin-top: 28px; }
.auth-sub { font-size: 14px; color: var(--text2); margin-bottom: 32px; }

.form-group { margin-bottom: 16px; }
.form-label { display: block; font-size: 13px; font-weight: 600; color: var(--text2); margin-bottom: 7px; }

.ml-input {
  width: 100%; padding: 14px 16px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: inherit; font-size: 15px; outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
.ml-input:focus { border-color: var(--green); background: #fff; }
.ml-input::placeholder { color: var(--text3); }

.auth-error {
  display: none; background: var(--danger-bg);
  border: 1px solid #FECACA; border-radius: var(--radius-xs);
  color: var(--danger); font-size: 13px; font-weight: 500;
  padding: 10px 14px; margin-bottom: 16px; line-height: 1.5;
}

.btn-primary {
  width: 100%; padding: 15px;
  background: var(--green); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; transition: background 0.2s, transform 0.1s;
  letter-spacing: -0.2px; margin-bottom: 12px;
}
.btn-primary:active { transform: scale(0.98); background: var(--green2); }

.btn-ghost {
  width: 100%; padding: 14px;
  background: none; border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text2);
  font-size: 14px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: border-color 0.2s;
}
.btn-ghost:hover { border-color: var(--green); color: var(--green); }

.auth-switch { text-align: center; margin-top: 20px; font-size: 14px; color: var(--text2); }
.auth-switch a { color: var(--green); font-weight: 700; text-decoration: none; cursor: pointer; }

.back-link {
  display: flex; align-items: center; gap: 6px;
  color: var(--text2); font-size: 14px; font-weight: 600;
  background: none; border: none; font-family: inherit;
  cursor: pointer; padding: 0; margin-bottom: 28px;
}
.back-link svg { width: 16px; height: 16px; stroke: var(--text2); }

/* ── APP ─────────────────────────────────────── */
#appScreen { background: var(--bg); overflow: hidden; }

/* TOP NAV */
.top-nav {
  background: var(--surface);
  border-bottom: 1px solid var(--border);
  padding: 0 16px;
  flex-shrink: 0;
  box-shadow: var(--shadow-sm);
}

.nav-brand-row {
  display: flex; align-items: center; gap: 8px;
  padding: 12px 0 8px;
}
.nav-brand-icon {
  width: 28px; height: 28px; border-radius: 8px;
  background: var(--green-bg);
  display: flex; align-items: center; justify-content: center;
}
.nav-brand-icon svg { width: 16px; height: 16px; stroke: var(--green); }
.nav-brand-name { font-size: 16px; font-weight: 800; color: var(--text); letter-spacing: -0.3px; }
.nav-brand-sub { font-size: 12px; color: var(--text3); margin-left: 2px; }

.top-tabs {
  display: flex; overflow-x: auto;
  -webkit-overflow-scrolling: touch;
  scrollbar-width: none; gap: 2px;
}
.top-tabs::-webkit-scrollbar { display: none; }

.top-tab {
  flex-shrink: 0; padding: 10px 14px;
  background: none; border: none;
  border-bottom: 2.5px solid transparent;
  color: var(--text3); font-size: 13px; font-weight: 600;
  font-family: inherit; cursor: pointer;
  transition: all 0.2s; white-space: nowrap;
  display: flex; align-items: center; gap: 5px;
}
.top-tab svg { width: 14px; height: 14px; stroke: currentColor; }
.top-tab.active { color: var(--green); border-bottom-color: var(--green); }

/* MAIN CONTENT */
#mainContent {
  flex: 1; overflow-y: auto;
  -webkit-overflow-scrolling: touch;
  padding: 20px 16px 36px;
}

/* ── PAGE COMPONENTS ─────────────────────────── */
.page-hero { margin-bottom: 22px; }
.hero-badge {
  display: inline-flex; align-items: center; gap: 5px;
  font-size: 11px; font-weight: 700; color: var(--green);
  background: var(--green-bg); border-radius: 20px;
  padding: 4px 10px; margin-bottom: 8px; letter-spacing: 0.3px;
}
.hero-badge svg { width: 11px; height: 11px; stroke: var(--green); }
.hero-title {
  font-size: 26px; font-weight: 800;
  color: var(--text); line-height: 1.25;
  letter-spacing: -0.6px;
}

/* CARDS */
.ml-card {
  background: var(--surface); border-radius: var(--radius);
  padding: 18px 16px; margin-bottom: 12px;
  box-shadow: var(--shadow-sm);
  border: 1px solid var(--border);
}
.ml-card.accent { border-color: var(--green); border-width: 1.5px; }
.ml-card.amber { background: var(--amber-bg); border-color: #FDE68A; }
.ml-card.danger { background: var(--danger-bg); border-color: #FECACA; }

.card-eyebrow {
  display: flex; align-items: center; gap: 6px;
  font-size: 11px; font-weight: 700; color: var(--green);
  text-transform: uppercase; letter-spacing: 0.6px;
  margin-bottom: 8px;
}
.card-eyebrow svg { width: 12px; height: 12px; stroke: var(--green); }
.card-body { font-size: 14px; color: var(--text2); line-height: 1.7; }

/* MODE TABS */
.mode-tabs {
  display: flex; gap: 6px; margin-bottom: 14px;
}
.mode-tab {
  flex: 1; padding: 10px 8px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--radius-xs); color: var(--text2);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.2s;
  display: flex; align-items: center; justify-content: center; gap: 5px;
}
.mode-tab svg { width: 13px; height: 13px; stroke: currentColor; }
.mode-tab.active {
  background: var(--green-bg); border-color: var(--green);
  color: var(--green);
}

/* INPUTS */
.ml-textarea {
  width: 100%; padding: 13px 14px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: inherit; font-size: 15px; resize: none;
  min-height: 108px; line-height: 1.65; outline: none;
  transition: border-color 0.2s, background 0.2s;
  -webkit-appearance: none;
}
.ml-textarea:focus { border-color: var(--green); background: #fff; }
.ml-textarea::placeholder { color: var(--text3); }
.ml-textarea.sm { min-height: 80px; }

.ml-input-field {
  width: 100%; padding: 13px 14px;
  background: var(--surface2); border: 1.5px solid var(--border2);
  border-radius: var(--radius-sm); color: var(--text);
  font-family: inherit; font-size: 15px; outline: none;
  transition: border-color 0.2s; -webkit-appearance: none;
}
.ml-input-field:focus { border-color: var(--green); background: #fff; }
.ml-input-field::placeholder { color: var(--text3); }
select.ml-input-field { cursor: pointer; }

/* IMAGE UPLOAD */
.img-drop {
  border: 2px dashed var(--border2); border-radius: var(--radius-sm);
  padding: 32px 16px; text-align: center;
  cursor: pointer; background: var(--surface2);
  transition: border-color 0.2s, background 0.2s;
}
.img-drop:hover { border-color: var(--green); background: var(--green-bg); }
.img-drop-icon { color: var(--text3); margin-bottom: 8px; }
.img-drop-icon svg { width: 32px; height: 32px; stroke: var(--text3); }
.img-drop-text { font-size: 14px; font-weight: 600; color: var(--text2); }
.img-drop-sub { font-size: 12px; color: var(--text3); margin-top: 4px; }

/* BUTTONS */
.btn-full {
  width: 100%; padding: 15px;
  background: var(--green); color: #fff;
  border: none; border-radius: var(--radius-sm);
  font-size: 15px; font-weight: 700; font-family: inherit;
  cursor: pointer; margin-top: 14px;
  display: flex; align-items: center; justify-content: center; gap: 8px;
  transition: background 0.2s, transform 0.1s;
  letter-spacing: -0.2px;
}
.btn-full svg { width: 16px; height: 16px; stroke: currentColor; }
.btn-full:active { transform: scale(0.98); background: var(--green2); }
.btn-full.secondary {
  background: var(--green-bg); color: var(--green);
  border: 1.5px solid var(--green-mid);
}
.btn-full.secondary:active { background: #d4f5e7; }
.btn-full.outline {
  background: none; color: var(--text2);
  border: 1.5px solid var(--border2);
}
.btn-full.danger-btn { background: var(--danger-bg); color: var(--danger); border: 1px solid #FECACA; }

.btn-row { display: flex; gap: 8px; margin-top: 14px; }
.btn-row .btn-full { margin-top: 0; }

.btn-sm {
  padding: 9px 14px; border-radius: var(--radius-xs);
  font-size: 13px; font-weight: 600; font-family: inherit;
  cursor: pointer; transition: all 0.15s;
  display: flex; align-items: center; gap: 5px;
  border: none;
}
.btn-sm svg { width: 13px; height: 13px; stroke: currentColor; }
.btn-sm.green { background: var(--green-bg); color: var(--green); }
.btn-sm.red { background: var(--danger-bg); color: var(--danger); }

/* SECTION LABEL */
.section-label {
  font-size: 11px; font-weight: 700;
  color: var(--text3); text-transform: uppercase;
  letter-spacing: 0.8px; margin-bottom: 10px;
  display: flex; align-items: center; gap: 5px;
}
.section-label svg { width: 11px; height: 11px; stroke: var(--text3); }

/* HINTS */
.hint-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 14px; }
.hint-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 12px;
  display: flex; align-items: center; gap: 8px;
  cursor: pointer; box-shadow: var(--shadow-sm);
  transition: all 0.15s;
}
.hint-card:active { transform: scale(0.97); border-color: var(--green); }
.hint-emoji { font-size: 18px; }
.hint-text { font-size: 12px; font-weight: 600; color: var(--text2); line-height: 1.3; }

/* LOADING */
.loading-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 20px 18px;
  margin-bottom: 12px; box-shadow: var(--shadow-sm);
}
.loading-header { display: flex; align-items: center; gap: 12px; margin-bottom: 16px; }
.spinner {
  width: 20px; height: 20px;
  border: 2.5px solid var(--green-bg); border-top-color: var(--green);
  border-radius: 50%; animation: spin 0.7s linear infinite; flex-shrink: 0;
}
@keyframes spin { to { transform: rotate(360deg); } }
.loading-title { font-size: 15px; font-weight: 700; }
.l-steps { display: flex; flex-direction: column; gap: 7px; }
.l-step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text3);
  padding: 8px 12px; background: var(--bg);
  border-radius: var(--radius-xs); border-left: 3px solid transparent;
  transition: all 0.3s;
}
.l-step svg { width: 14px; height: 14px; stroke: var(--text3); flex-shrink: 0; }
.l-step.done { color: var(--green2); background: var(--green-bg); border-left-color: var(--green); font-weight: 600; }
.l-step.done svg { stroke: var(--green); }

.loading-inline {
  text-align: center; padding: 28px 16px;
  font-size: 14px; color: var(--text2);
  display: flex; align-items: center; justify-content: center; gap: 8px;
}
.loading-inline svg { width: 16px; height: 16px; stroke: var(--text2); }

/* RESULT */
.result-title-bar {
  display: flex; align-items: center; justify-content: space-between;
  margin-bottom: 14px;
}
.result-product-name { font-size: 20px; font-weight: 800; letter-spacing: -0.4px; }
.result-tag {
  font-size: 11px; font-weight: 700;
  background: var(--green-bg); color: var(--green);
  border-radius: 20px; padding: 4px 10px;
}

.opp-row { display: flex; align-items: flex-start; gap: 8px; margin-bottom: 9px; }
.opp-bullet {
  width: 7px; height: 7px; border-radius: 50%;
  background: var(--green); flex-shrink: 0; margin-top: 5px;
}
.opp-text { font-size: 14px; color: var(--text); line-height: 1.55; }

.my-idea-label { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }

.idea-item {
  display: flex; gap: 12px;
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px;
  margin-bottom: 10px; box-shadow: var(--shadow-sm);
  border-left: 3px solid var(--green-mid);
}
.idea-idx {
  width: 26px; height: 26px; border-radius: 50%;
  background: var(--green-bg); color: var(--green);
  font-size: 12px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.idea-body { flex: 1; }
.idea-title { font-size: 14px; font-weight: 700; margin-bottom: 5px; }
.idea-desc { font-size: 13px; color: var(--text2); line-height: 1.6; margin-bottom: 7px; }
.revenue-tag {
  display: inline-flex; align-items: center; gap: 4px;
  font-size: 12px; font-weight: 600; color: var(--green2);
  background: var(--green-bg); border-radius: 6px; padding: 3px 9px;
}
.revenue-tag svg { width: 11px; height: 11px; stroke: var(--green2); }

.reliability-strip {
  background: var(--amber-bg); border: 1px solid #FDE68A;
  border-radius: var(--radius-xs); padding: 10px 14px;
  font-size: 12px; color: #92400E; margin: 12px 0;
  display: flex; align-items: flex-start; gap: 6px; line-height: 1.5;
}
.reliability-strip svg { width: 13px; height: 13px; stroke: var(--amber); flex-shrink: 0; margin-top: 1px; }

/* STATS */
.stat-row { display: flex; gap: 8px; margin-bottom: 16px; }
.stat-box {
  flex: 1; background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 10px;
  text-align: center; box-shadow: var(--shadow-sm);
}
.stat-num { font-size: 22px; font-weight: 800; color: var(--green); letter-spacing: -0.5px; }
.stat-num.sm { font-size: 12px; font-weight: 700; padding-top: 5px; line-height: 1.4; }
.stat-label { font-size: 11px; color: var(--text3); margin-top: 3px; }

/* IDEA LIST */
.idea-list-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px;
  margin-bottom: 10px; box-shadow: var(--shadow-sm);
  cursor: pointer; transition: border-color 0.2s, box-shadow 0.2s;
}
.idea-list-card:active { border-color: var(--green); }
.ilc-main { display: flex; align-items: flex-start; justify-content: space-between; gap: 10px; }
.ilc-name { font-size: 15px; font-weight: 700; margin-bottom: 4px; }
.ilc-preview { font-size: 13px; color: var(--text3); line-height: 1.4; }
.ilc-right { display: flex; flex-direction: column; align-items: flex-end; gap: 5px; flex-shrink: 0; }
.pill {
  font-size: 11px; font-weight: 700; border-radius: 20px; padding: 3px 9px;
}
.pill.green { background: var(--green-bg); color: var(--green); }
.pill.gray { background: var(--bg); color: var(--text3); border: 1px solid var(--border2); }
.date-text { font-size: 11px; color: var(--text3); }
.chevron-icon { color: var(--text3); }
.chevron-icon svg { width: 16px; height: 16px; stroke: var(--text3); }

.detail-panel { display: none; }
.detail-divider { height: 1px; background: var(--border); margin: 14px 0; }
.detail-row { margin-bottom: 10px; }
.detail-key { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; margin-bottom: 3px; }
.detail-val { font-size: 13px; color: var(--text2); line-height: 1.55; }
.detail-val.hl { color: var(--text); font-weight: 600; }
.detail-actions { display: flex; gap: 8px; margin-top: 14px; }

/* EVAL */
.selected-bar {
  background: var(--green-bg); border: 1.5px solid var(--green-mid);
  border-radius: var(--radius-sm); padding: 12px 14px; margin-bottom: 12px;
  display: flex; align-items: center; gap: 10px;
}
.selected-bar svg { width: 16px; height: 16px; stroke: var(--green); flex-shrink: 0; }
.selected-bar-inner { flex: 1; }
.selected-label { font-size: 11px; font-weight: 700; color: var(--green); text-transform: uppercase; }
.selected-name { font-size: 14px; font-weight: 700; color: var(--text); margin-top: 2px; }

.notice-card {
  display: flex; gap: 12px; align-items: flex-start;
  background: var(--amber-bg); border: 1px solid #FDE68A;
  border-radius: var(--radius-sm); padding: 14px; margin-bottom: 12px;
}
.notice-icon svg { width: 18px; height: 18px; stroke: var(--amber); }
.notice-title { font-size: 13px; font-weight: 700; margin-bottom: 3px; }
.notice-desc { font-size: 12px; color: var(--text2); line-height: 1.5; }
.notice-link {
  background: none; border: none; color: var(--amber); font-size: 12px;
  font-weight: 700; font-family: inherit; cursor: pointer;
  padding: 0; margin-top: 6px; display: block;
  text-decoration: underline;
}

.eval-meta-card {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 12px;

}
.eval-meta-title { font-size: 14px; font-weight: 700; margin-bottom: 8px; }
.eval-meta-tags { display: flex; flex-wrap: wrap; gap: 6px; justify-content: center; }
.eval-meta-tag {
  font-size: 12px; font-weight: 600; color: var(--indigo);
  background: var(--indigo-bg); border-radius: 20px; padding: 4px 10px;
}

/* GRADE */
.grade-hero {
  border-radius: var(--radius); padding: 28px 20px;
  text-align: center; margin-bottom: 14px;
  border: 1.5px solid; position: relative; overflow: hidden;
}
.grade-letter { font-size: 72px; font-weight: 800; line-height: 1; letter-spacing: -2px; }
.grade-pts { font-size: 22px; font-weight: 700; margin-top: 4px; }
.grade-pts-max { font-size: 13px; color: var(--text3); }
.grade-summary { font-size: 14px; color: var(--text2); line-height: 1.65; margin-top: 12px; }

/* SCORE */
.score-card { padding: 14px 16px; }
.score-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 8px; }
.score-label-text { font-size: 14px; font-weight: 600; display: flex; align-items: center; gap: 6px; }
.score-label-text svg { width: 14px; height: 14px; stroke: var(--text2); }
.score-pts { font-size: 18px; font-weight: 800; }
.score-pts-max { font-size: 12px; font-weight: 500; color: var(--text3); }
.score-bar-bg { height: 6px; background: var(--bg); border-radius: 3px; overflow: hidden; margin-bottom: 8px; }
.score-bar-fill { height: 100%; border-radius: 3px; transition: width 1s ease; }
.score-reason-text { font-size: 13px; color: var(--text2); line-height: 1.5; }

/* INSIGHT */
.insight-item {
  display: flex; gap: 10px; align-items: flex-start;
  padding: 12px 0; font-size: 14px; line-height: 1.55;
}
.insight-icon svg { width: 16px; height: 16px; flex-shrink: 0; }
.insight-divider { height: 1px; background: var(--border); }

/* DRAFT */
.draft-name { font-size: 22px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 3px; }
.draft-liner { font-size: 14px; color: var(--green); font-weight: 600; font-style: italic; margin-bottom: 16px; }
.draft-kv { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.draft-k { font-size: 11px; font-weight: 700; color: var(--text3); text-transform: uppercase; min-width: 36px; flex-shrink: 0; margin-top: 2px; }
.draft-v { font-size: 14px; color: var(--text2); line-height: 1.5; }
.draft-plan-row { display: flex; gap: 12px; align-items: flex-start; margin-bottom: 10px; }
.draft-month { font-size: 11px; font-weight: 700; color: var(--green); min-width: 52px; flex-shrink: 0; margin-top: 2px; }

/* CASES */
.case-card {
  background: var(--surface); border: 1px solid var(--border);
  border-radius: var(--radius); padding: 16px; margin-bottom: 12px;
  box-shadow: var(--shadow-sm); border-left: 4px solid transparent;
}
.case-card.success { border-left-color: var(--green); }
.case-card.fail { border-left-color: var(--danger); }
.case-top { display: flex; justify-content: space-between; align-items: flex-start; gap: 8px; margin-bottom: 10px; }
.case-name { font-size: 15px; font-weight: 700; }
.case-pills { display: flex; gap: 4px; flex-shrink: 0; }
.case-row { font-size: 13px; color: var(--text2); margin-bottom: 7px; line-height: 1.5; display: flex; gap: 6px; }
.case-key { font-weight: 700; color: var(--text); flex-shrink: 0; }
.case-insight {
  font-size: 13px; font-weight: 600; color: var(--green2);
  background: var(--green-bg); border-radius: var(--radius-xs);
  padding: 9px 12px; margin-top: 10px; line-height: 1.5;
  display: flex; gap: 6px; align-items: flex-start;
}
.case-insight svg { width: 13px; height: 13px; stroke: var(--green); flex-shrink: 0; margin-top: 1px; }

/* SETTINGS */
.profile-card { display: flex; align-items: center; gap: 14px; }
.avatar-circle {
  width: 50px; height: 50px; border-radius: 50%;
  background: linear-gradient(135deg, var(--green), var(--indigo));
  color: #fff; font-size: 20px; font-weight: 800;
  display: flex; align-items: center; justify-content: center; flex-shrink: 0;
}
.profile-name { font-size: 16px; font-weight: 700; }
.profile-email { font-size: 13px; color: var(--text3); }
.logout-btn {
  margin-left: auto; background: var(--bg); border: 1.5px solid var(--border2);
  border-radius: var(--radius-xs); padding: 8px 14px;
  font-size: 13px; font-weight: 600; font-family: inherit; color: var(--text2);
  cursor: pointer; flex-shrink: 0; display: flex; align-items: center; gap: 5px;
}
.logout-btn svg { width: 13px; height: 13px; stroke: var(--text2); }
.profile-hint { font-size: 13px; color: var(--text3); line-height: 1.55; margin-bottom: 16px; }
.danger-notice { font-size: 12px; color: var(--text3); text-align: center; margin-top: 8px; }

/* EMPTY */
.empty-state { text-align: center; padding: 56px 24px; }
.empty-icon {
  width: 72px; height: 72px; border-radius: 20px;
  background: var(--surface2); border: 1px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  margin: 0 auto 18px;
}
.empty-icon svg { width: 32px; height: 32px; stroke: var(--text3); }
.empty-title { font-size: 17px; font-weight: 700; margin-bottom: 8px; }
.empty-desc { font-size: 14px; color: var(--text3); line-height: 1.65; }
.empty-btn {
  display: inline-flex; align-items: center; gap: 6px;
  background: var(--green); color: #fff;
  border: none; border-radius: var(--radius-sm);
  padding: 12px 24px; font-size: 14px; font-weight: 700;
  font-family: inherit; cursor: pointer; margin-top: 20px;
}
.empty-btn svg { width: 14px; height: 14px; stroke: #fff; }

/* ERROR */
.error-state { text-align: center; padding: 20px 16px; }
.error-state svg { width: 28px; height: 28px; stroke: var(--danger); margin-bottom: 8px; }
.error-msg { font-size: 14px; font-weight: 600; color: var(--danger); }
.error-detail { font-size: 12px; color: var(--text3); margin-top: 4px; line-height: 1.5; }

/* TOAST */
.toast {
  position: fixed; bottom: 28px; left: 50%;
  transform: translateX(-50%) translateY(16px);
  background: var(--text); color: #fff;
  padding: 11px 20px; border-radius: 24px;
  font-size: 14px; font-weight: 600;
  z-index: 9999; opacity: 0;
  transition: all 0.25s cubic-bezier(.4,0,.2,1);
  white-space: nowrap; max-width: 90vw;
  display: flex; align-items: center; gap: 7px;
  box-shadow: var(--shadow-md); pointer-events: none;
}
.toast svg { width: 15px; height: 15px; stroke: currentColor; }
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.err { background: var(--danger); }

/* DIVIDER */
.ml-divider { height: 1px; background: var(--border); margin: 16px 0; }

/* UTILS */
.mt-8 { margin-top: 8px; }
.mt-12 { margin-top: 12px; }
.mt-16 { margin-top: 16px; }
.mt-20 { margin-top: 20px; }
.mt-24 { margin-top: 24px; }
.mb-12 { margin-bottom: 12px; }

.ai-guide-box {
  background: var(--surface2); border: 1px solid var(--border);
  border-radius: var(--radius-sm); padding: 14px; margin-top: 12px;
}
.ai-guide-title {
  display: flex; align-items: center; gap: 6px;
  font-size: 12px; font-weight: 700; color: var(--text2);
  margin-bottom: 10px;
}
.ai-guide-title svg { width: 13px; height: 13px; stroke: var(--text2); }
.ai-guide-steps { display: flex; flex-direction: column; gap: 7px; margin-bottom: 12px; }
.ai-guide-step {
  display: flex; align-items: center; gap: 8px;
  font-size: 13px; color: var(--text2);
}
.step-num {
  width: 20px; height: 20px; border-radius: 50%;
  background: var(--green); color: #fff;
  font-size: 11px; font-weight: 800;
  display: flex; align-items: center; justify-content: center;
  flex-shrink: 0;
}
.ai-guide-links {
  display: flex; gap: 8px; flex-wrap: wrap;
}
.ai-link {
  display: inline-block; font-size: 12px; font-weight: 700;
  color: var(--indigo); background: var(--indigo-bg);
  border-radius: 20px; padding: 5px 12px;
  text-decoration: none; transition: opacity 0.2s;
}
.ai-link:active { opacity: 0.7; }
.ai-photo-note {
  font-size: 12px; color: var(--text3); margin-top: 10px;
  padding-top: 10px; border-top: 1px solid var(--border);
  line-height: 1.5;
}
.paste-hint { font-size: 13px; color: var(--text2); margin-bottom: 10px; line-height: 1.5; }

/* RESPONSIVE */
@media (min-width: 480px) {
  body { background: #E8EAF0; }
  .screen { max-width: 480px; margin: 0 auto; box-shadow: var(--shadow-md); }
  #onboardingScreen, #authScreen { border-radius: 0; }
}
@media (orientation: landscape) and (max-height: 500px) {
  .ob-icon-wrap { width: 72px; height: 72px; margin-bottom: 20px; }
  .ob-icon-wrap svg { width: 36px; height: 36px; }
  .ob-title { font-size: 22px; margin-bottom: 8px; }
  .ob-desc { margin-bottom: 16px; }
  .page-hero { margin-bottom: 14px; }
  .hero-title { font-size: 22px; }
  .ml-card { padding: 14px; }
}
</style>
</head>
<body>

<!-- ONBOARDING -->

  <div class="ob-body">

    <h1 class="ob-title" id="obTitle"></h1>

<!-- AUTH LOGIN -->
<div id="authScreen" class="screen">

</div>

<!-- APP -->
<div id="appScreen" class="screen">
  <header class="top-nav">
    <div class="nav-brand-row">
      <div class="nav-brand-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>

        렌즈
      </button>
      <button class="top-tab" data-page="ideas" id="tab-ideas">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>

        사례

        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        설정
      </button>
    </nav>
  </header>
  <div id="mainContent"></div>
</div>

<script>
// ── FIREBASE INIT ──────────────────────────────────
const firebaseConfig = {
  apiKey: "AIzaSyBujxf8knm_dolV2cDD_nuxMI9hucXD5ys",
  authDomain: "moneylens-e8557.firebaseapp.com",
  projectId: "moneylens-e8557",
  storageBucket: "moneylens-e8557.firebasestorage.app",
  messagingSenderId: "1085597108252",
  appId: "1:1085597108252:web:a340c8ebc84e153b4037d9"
};
firebase.initializeApp(firebaseConfig);
const auth = firebase.auth();
const db = firebase.firestore();

// ── STATE ──────────────────────────────────────────
let currentUser = null;
let userProfile = null;
let currentAnalysis = null;
let currentPage = 'lens';
let radarChart = null;
let obStep = 0;

// ── ONBOARDING ────────────────────────────────────
const obSlides = [
  { icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;stroke:var(--green)"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>`, title: '상품을 보는 눈이\n달라집니다', desc: '편의점 삼각김밥, 스타벅스 커피, 배달앱…\n일상의 모든 것이 사업 아이디어가 됩니다' },
  { icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;stroke:var(--green)"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>`, title: '원가부터 유통까지\nAI가 해부합니다', desc: '생산 구조, 유통 마진, 시장 규모를\n한눈에 파악하세요' },
  { icon: `<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;stroke:var(--green)"><line x1="12" y1="1" x2="12" y2="23"/><path d="M17 5H9.5a3.5 3.5 0 0 0 0 7h5a3.5 3.5 0 0 1 0 7H6"/></svg>`, title: '기회를 발견하고\n사업으로 만드세요', desc: '실현가능성 평가부터 사업 초안까지\n돈 버는 생각을 실행으로' }
];

function renderObSlide() {
  const s = obSlides[obStep];
  document.getElementById('obIconWrap').innerHTML = s.icon;
  document.getElementById('obTitle').innerHTML = s.title.replace('\n','<br>');
  document.getElementById('obDesc').innerHTML = s.desc.replace('\n','<br>');
  const dots = document.getElementById('obDots');
  dots.innerHTML = obSlides.map((_,i) => `<div class="ob-dot${i===obStep?' active':''}"></div>`).join('');
  document.getElementById('obNextBtn').textContent = obStep < obSlides.length-1 ? '다음' : '시작하기';
  document.getElementById('obSkip').style.visibility = obStep < obSlides.length-1 ? 'visible' : 'hidden';
}

document.getElementById('obNextBtn').addEventListener('click', function() {
  if (obStep < obSlides.length-1) { obStep++; renderObSlide(); }
  else showAuth('login');
});
document.getElementById('obSkip').addEventListener('click', function() { showAuth('login'); });

renderObSlide();

// ── AUTH SCREENS ──────────────────────────────────
function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById(name + 'Screen').classList.add('active');
}

function showAuth(mode) {
  showScreen('auth');
  if (mode === 'login') renderLogin();
  else renderSignup();
}

function renderLogin() {
  document.getElementById('authWrap').innerHTML = `
    <div class="auth-logo-wrap">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="auth-brand">MoneyLens</span>
    </div>
    <h1 class="auth-heading">로그인</h1>
    <p class="auth-sub">돈 버는 생각을 시작하세요</p>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" id="loginEmail" class="ml-input" placeholder="이메일을 입력하세요" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" id="loginPw" class="ml-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
    </div>
    <div id="loginError" class="auth-error"></div>
    <button class="btn-primary" id="loginBtn">로그인</button>
    <button class="btn-ghost" id="goSignupBtn">처음 오셨나요? 회원가입</button>
    <div class="auth-switch mt-16">
      <span id="toSignup" style="cursor:pointer;color:var(--green);font-weight:700;">회원가입 →</span>
    </div>
  `;
  document.getElementById('loginBtn').addEventListener('click', doLogin);
  document.getElementById('loginEmail').addEventListener('keydown', e => { if(e.key==='Enter') document.getElementById('loginPw').focus(); });
  document.getElementById('loginPw').addEventListener('keydown', e => { if(e.key==='Enter') doLogin(); });
  document.getElementById('goSignupBtn').addEventListener('click', function() { renderSignup(); });
  document.getElementById('toSignup').addEventListener('click', function() { renderSignup(); });
}

function renderSignup() {
  document.getElementById('authWrap').innerHTML = `
    <button class="back-link" id="backToLogin">
      <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="15 18 9 12 15 6"/></svg>
      로그인으로 돌아가기
    </button>
    <div class="auth-logo-wrap">
      <div class="auth-logo-icon">
        <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="auth-brand">MoneyLens</span>
    </div>
    <h1 class="auth-heading">회원가입</h1>
    <p class="auth-sub">계정을 만들어 시작하세요</p>
    <div class="form-group">
      <label class="form-label">이름</label>
      <input type="text" id="signupName" class="ml-input" placeholder="이름을 입력하세요">
    </div>
    <div class="form-group">
      <label class="form-label">이메일</label>
      <input type="email" id="signupEmail" class="ml-input" placeholder="이메일을 입력하세요" autocomplete="email">
    </div>
    <div class="form-group">
      <label class="form-label">비밀번호</label>
      <input type="password" id="signupPw" class="ml-input" placeholder="6자 이상 입력하세요" autocomplete="new-password">
    </div>
    <div id="signupError" class="auth-error"></div>
    <button class="btn-primary" id="signupBtn">회원가입</button>
  `;
  document.getElementById('backToLogin').addEventListener('click', function() { renderLogin(); });
  document.getElementById('signupBtn').addEventListener('click', doSignup);
  document.getElementById('signupPw').addEventListener('keydown', e => { if(e.key==='Enter') doSignup(); });
}

function showAuthError(elId, msg) {
  const el = document.getElementById(elId);
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

function doLogin() {
  const email = (document.getElementById('loginEmail')?.value || '').trim();
  const pw = document.getElementById('loginPw')?.value || '';
  if (!email || !pw) { showAuthError('loginError','이메일과 비밀번호를 입력해주세요'); return; }
  auth.signInWithEmailAndPassword(email, pw).catch(e => {
    const msg = e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found'
      ? '이메일 또는 비밀번호가 올바르지 않습니다' : '로그인 실패: '+e.message;
    showAuthError('loginError', msg);
  });
}

function doSignup() {
  const name = (document.getElementById('signupName')?.value || '').trim();
  const email = (document.getElementById('signupEmail')?.value || '').trim();
  const pw = document.getElementById('signupPw')?.value || '';
  if (!name||!email||!pw) { showAuthError('signupError','모든 항목을 입력해주세요'); return; }
  if (pw.length < 6) { showAuthError('signupError','비밀번호는 6자 이상이어야 합니다'); return; }
  auth.createUserWithEmailAndPassword(email, pw)
    .then(cred => cred.user.updateProfile({ displayName: name }))
    .catch(e => {
      const msg = e.code==='auth/email-already-in-use' ? '이미 사용 중인 이메일입니다'
        : e.code==='auth/invalid-email' ? '이메일 형식이 올바르지 않습니다' : '회원가입 실패: '+e.message;
      showAuthError('signupError', msg);
    });
}

async function loadUserProfile() {
  try {
    const snap = await db.collection(`users/${currentUser.uid}/profile`).get();
    userProfile = snap.empty ? null : snap.docs[0].data();
  } catch(e) { userProfile = null; }
}

async function saveProfile(data) {
  try {
    const snap = await db.collection(`users/${currentUser.uid}/profile`).get();
    if (!snap.empty) await snap.docs[0].ref.update(data);
    else await db.collection(`users/${currentUser.uid}/profile`).add(data);
    userProfile = data;
    showToast('프로필이 저장됐습니다');
  } catch(e) { showToast('저장 실패: '+e.message, true); }
}

function buildAnalysisPrompt(inputContent, inputType) {
  const profileCtx = userProfile
    ? `\n\n[사용자 프로필]\n- 보유 역량: ${userProfile.skills||'미입력'}\n- 가용 자본: ${userProfile.capital||'미입력'}\n- 관심 산업: ${userProfile.industry||'미입력'}\n- 가용 시간: ${userProfile.time||'미입력'}\n위 프로필을 기반으로 "나의 적합도" 분석 시 개인화된 평가를 해주세요.`
    : '';

  return `당신은 비즈니스 역공학(reverse engineering) 전문가입니다.
아래 상품/서비스를 분석하여 돈이 되는 기회를 발견해주세요.
모든 분석은 한국어로, 구체적 수치와 함께 제공하고
추정값은 ✅확인됨 / ⚠️추정 / ❓불확실 로 표기해주세요.

[분석 대상]
${inputType==='url'?'URL: ':''}${inputContent}
${profileCtx}

아래 6가지 항목을 순서대로 분석해주세요:

1. 📋 상품 개요
(무엇인가, 왜 만들어졌나 - 2~3문장)

2. 🏭 생산 구조
(어디서 어떻게 만들어지나, 원가 추정 - 신뢰도 표기)

3. 🚚 유통 경로
(제조→도매→소매 구조, 각 단계 마진 추정)

4. 📊 시장 규모
(국내/글로벌 추정)

5. 💡 기회 포인트
(개선/틈새/사업 기회 3가지)

6. 💰 돈 되는 아이디어 3가지
각 아이디어마다:
- 아이디어명:
- 설명: (2~3문장)
- 수익 모델:`;
}

function copyPrompt() {
  const activeMode = document.querySelector('.mode-tab.active')?.dataset.mode;
  let inputContent = '';

  if (activeMode==='text') {
    inputContent = (document.getElementById('textInput')?.value||'').trim();
  } else if (activeMode==='image') {
    inputContent = (document.getElementById('textInput')?.value||'').trim() || '업로드한 상품 이미지';
  } else {
    inputContent = (document.getElementById('urlInput')?.value||'').trim();
  }

  if (!inputContent || inputContent==='업로드한 상품 이미지' && activeMode!=='image') {
    showToast('분석할 내용을 입력해주세요', true); return;
  }

  const prompt = buildAnalysisPrompt(inputContent, activeMode);
  navigator.clipboard.writeText(prompt).then(() => {
    showToast('프롬프트가 복사됐습니다! AI에 붙여넣어 주세요');
    // 결과 붙여넣기 영역 표시
    const pasteSection = document.getElementById('pasteResultSection');
    if (pasteSection) pasteSection.style.display = 'block';
    // currentAnalysis에 inputContent 저장
    currentAnalysis = { inputContent, inputType: activeMode, productName: inputContent };
  }).catch(() => {
    // clipboard API 실패시 fallback
    const ta = document.createElement('textarea');
    ta.value = prompt;
    ta.style.position = 'fixed'; ta.style.opacity = '0';
    document.body.appendChild(ta);
    ta.select(); document.execCommand('copy');
    document.body.removeChild(ta);
    showToast('프롬프트가 복사됐습니다! AI에 붙여넣어 주세요');
    const pasteSection = document.getElementById('pasteResultSection');
    if (pasteSection) pasteSection.style.display = 'block';
    currentAnalysis = { inputContent, inputType: activeMode, productName: inputContent };
  });
}

function parsePasteResult(rawText) {
  // AI 결과를 파싱해서 구조화
  const result = {
    productName: currentAnalysis?.inputContent || '분석 결과',
    inputContent: currentAnalysis?.inputContent || '',
    inputType: currentAnalysis?.inputType || 'text',
    overview: '', production: '', distribution: '', market: '',
    opportunities: [], ideas: [],
    reliabilityNote: '사용자가 AI로부터 직접 받은 분석 결과입니다.',
    rawText: rawText,
    timestamp: new Date().toISOString()
  };

  // 섹션 추출
  const sections = {
    overview: /1\.\s*📋[^
]*
([\s\S]*?)(?=2\.|$)/,
    production: /2\.\s*🏭[^
]*
([\s\S]*?)(?=3\.|$)/,
    distribution: /3\.\s*🚚[^
]*
([\s\S]*?)(?=4\.|$)/,
    market: /4\.\s*📊[^
]*
([\s\S]*?)(?=5\.|$)/,
  };

  for (const [key, regex] of Object.entries(sections)) {
    const match = rawText.match(regex);
    if (match) result[key] = match[1].trim();
  }

  // 기회 포인트 파싱
  const oppMatch = rawText.match(/5\.\s*💡[^
]*
([\s\S]*?)(?=6\.|$)/);
  if (oppMatch) {
    result.opportunities = oppMatch[1].split('\n')
      .map(l => l.replace(/^[-•*\d.]+\s*/, '').trim())
      .filter(l => l.length > 10)
      .slice(0, 3);
  }

  // 아이디어 파싱
  const ideaMatch = rawText.match(/6\.\s*💰[^
]*
([\s\S]*?)$/);
  if (ideaMatch) {
    const ideaText = ideaMatch[1];
    const ideaBlocks = ideaText.split(/(?=아이디어명:|[-•]\s*아이디어)/);
    ideaBlocks.forEach(block => {
      const titleMatch = block.match(/아이디어명[：:]?\s*([^
]+)/);
      const descMatch = block.match(/설명[：:]?\s*([\s\S]*?)(?=수익 모델|$)/);
      const revenueMatch = block.match(/수익 모델[：:]?\s*([^
]+)/);
      if (titleMatch) {
        result.ideas.push({
          title: titleMatch[1].trim(),
          description: descMatch ? descMatch[1].trim() : '',
          revenueModel: revenueMatch ? revenueMatch[1].trim() : ''
        });
      }
    });
  }

  // 파싱 실패 시 rawText 전체를 overview로
  if (!result.overview && !result.opportunities.length) {
    result.overview = rawText.slice(0, 500);
  }

  return result;
}

async function saveAnalysis() {
  if (!currentAnalysis) { showToast('분석 결과가 없습니다', true); return; }
  try {
    await db.collection(`users/${currentUser.uid}/analyses`).add({...currentAnalysis, savedAt: firebase.firestore.FieldValue.serverTimestamp(), evaluated:false});
    showToast('아이디어함에 저장됐습니다 ✅');
  } catch(e) { showToast('저장 실패: '+e.message, true); }
}

// ── IDEAS ──────────────────────────────────────────
async function renderIdeas(main) {
  main.innerHTML = `<div class="page-hero"><div class="hero-badge"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>아이디어함</div><h1 class="hero-title">저장된 분석</h1></div><div class="loading-inline"><div class="spinner"></div>불러오는 중...</div>`;
  try {
    const snap = await db.collection(`users/${currentUser.uid}/analyses`).orderBy('savedAt','desc').get();
    const list = snap.docs.map(d=>({id:d.id,...d.data()}));
    const evalCount = list.filter(a=>a.evaluated).length;
    const topKeys={};
    list.forEach(a=>{ const k=(a.productName||'기타').split(' ')[0]; topKeys[k]=(topKeys[k]||0)+1; });
    const top3 = Object.entries(topKeys).sort((a,b)=>b[1]-a[1]).slice(0,3).map(e=>e[0]).join(' · ');

    let html = `<div class="page-hero"><div class="hero-badge"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>아이디어함</div><h1 class="hero-title">저장된 분석</h1></div>
    <div class="stat-row">
      <div class="stat-box"><div class="stat-num">${list.length}</div><div class="stat-label">총 분석</div></div>
      <div class="stat-box"><div class="stat-num">${evalCount}</div><div class="stat-label">평가 완료</div></div>
      <div class="stat-box" style="flex:1.5"><div class="stat-num sm">${top3||'-'}</div><div class="stat-label">관심 분야</div></div>
    </div>`;

    if (list.length===0) {
      html += `<div class="empty-state"><div class="empty-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg></div><div class="empty-title">아직 저장된 분석이 없습니다</div><div class="empty-desc">렌즈 탭에서 상품을 분석하면<br>여기에 저장됩니다</div><button class="empty-btn" data-goto="lens"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>렌즈로 이동</button></div>`;
    } else {
      html += list.map(a=>`
        <div class="idea-list-card" data-id="${a.id}">
          <div class="ilc-main">
            <div><div class="ilc-name">${a.productName||a.inputContent}</div><div class="ilc-preview">${a.opportunities?.[0]||''}</div></div>
            <div class="ilc-right">
              ${a.evaluated?'<span class="pill green">평가완료</span>':''}
              <span class="date-text">${fmtDate(a.savedAt)}</span>
              <div class="chevron-icon"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="9 18 15 12 9 6"/></svg></div>
            </div>
          </div>
          <div class="detail-panel" id="dp-${a.id}">
            <div class="detail-divider"></div>
            ${a.overview?`<div class="detail-row"><div class="detail-key">개요</div><div class="detail-val">${a.overview}</div></div>`:''}
            ${a.myIdea?`<div class="detail-row"><div class="detail-key">내 아이디어</div><div class="detail-val hl">${a.myIdea}</div></div>`:''}
            <div class="detail-actions">
              <button class="btn-sm green" data-eval="${a.id}"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="18" y1="20" x2="18" y2="10"/><line x1="12" y1="20" x2="12" y2="4"/><line x1="6" y1="20" x2="6" y2="14"/></svg>평가하기</button>
              <button class="btn-sm red" data-del="${a.id}"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="3 6 5 6 21 6"/><path d="M19 6v14a2 2 0 0 1-2 2H7a2 2 0 0 1-2-2V6m3 0V4a1 1 0 0 1 1-1h4a1 1 0 0 1 1 1v2"/></svg>삭제</button>
            </div>
          </div>
        </div>`).join('');
    }
    main.innerHTML = html;

    main.addEventListener('click', async function(e) {
      const gotoBtn = e.target.closest('[data-goto]');
      if (gotoBtn) { goPage(gotoBtn.dataset.goto); return; }

      const evalBtn = e.target.closest('[data-eval]');
      if (evalBtn) {
        const id = evalBtn.dataset.eval;
        const found = list.find(a=>a.id===id);
        if (found) { currentAnalysis = found; goPage('eval'); }
        return;
      }
      const delBtn = e.target.closest('[data-del]');
      if (delBtn) {
        if (!confirm('삭제하시겠습니까?')) return
        await db.collection(`users/${currentUser.uid}/analyses`).doc(delBtn.dataset.del).delete();
        showToast('삭제됐습니다');
        renderIdeas(main);
        return;
      }
      const card = e.target.closest('.idea-list-card');
      if (card) {
        const dp = document.getElementById(`dp-${card.dataset.id}`);
        if (dp) dp.style.display = dp.style.display==='none'||!dp.style.display ? 'block' : 'none';
      }
    });
  } catch(e) {
    main.innerHTML += `<div class="ml-card error-state"><div class="error-msg">${e.message}</div></div>`;
  }
}

function runEval() {
  const div = document.getElementById('evalResult');
  const profileCtx = userProfile
    ? `\n\n[내 프로필]\n- 역량: ${userProfile.skills||'미입력'}\n- 자본: ${userProfile.capital||'미입력'}\n- 관심산업: ${userProfile.industry||'미입력'}\n- 가용시간: ${userProfile.time||'미입력'}`
    : '';

  const prompt = `당신은 비즈니스 아이디어 실현가능성 평가 전문가입니다.
아래 아이디어를 5가지 항목으로 평가해주세요.

[분석 대상]: ${currentAnalysis?.productName||''}
[개요]: ${currentAnalysis?.overview||''}
[기회 포인트]: ${(currentAnalysis?.opportunities||[]).join(', ')}${profileCtx}

아래 형식으로 평가해주세요:

## 실현가능성 평가

**종합 등급**: S/A/B/C 중 하나 (S: 90점↑, A: 75점↑, B: 60점↑, C: 60점↓)
**총점**: 00점 / 100점

### 항목별 점수 (각 20점 만점)
1. 시장성: 00점 - (이유)
2. 실행 난이도: 00점 - (이유)
3. 초기 자본: 00점 - (이유)
4. 경쟁 강도: 00점 - (이유)
5. 나의 적합도: 00점 - (이유)

### 종합 평가
(2~3문장)

### 강점
(가장 유리한 점)

### 약점
(가장 보완해야 할 점)

### 첫 번째 실행 액션
(당장 할 수 있는 구체적 액션 1가지)`;

  navigator.clipboard.writeText(prompt).then(() => {
    showToast('평가 프롬프트 복사됨! AI에 붙여넣어 주세요');
    div.innerHTML = `
      <div class="ml-card mt-16">
        <div class="card-eyebrow"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="9" y="9" width="13" height="13" rx="2"/><path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"/></svg>평가 프롬프트 복사 완료</div>
        <div class="card-body">AI에 붙여넣고 결과를 받아오세요.<br>결과를 아래에 붙여넣으면 저장됩니다.</div>
        <div class="ai-guide-links mt-8">
          <a href="https://chat.openai.com" target="_blank" class="ai-link">ChatGPT 열기 →</a>
          <a href="https://claude.ai" target="_blank" class="ai-link">Claude 열기 →</a>
        </div>
      </div>
      <div class="section-label mt-16">AI 평가 결과 붙여넣기</div>
      <div class="ml-card">
        <textarea id="evalPasteInput" class="ml-textarea" style="min-height:160px" placeholder="AI 평가 결과를 여기에 붙여넣어 주세요..."></textarea>
        <button class="btn-full mt-12" id="saveEvalBtn">
          <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>
          평가 결과 저장하기
        </button>
      </div>
      <div id="evalDisplayResult"></div>
    `;
    document.getElementById('saveEvalBtn').addEventListener('click', saveEvalResult);
  }).catch(() => {
    const ta = document.createElement('textarea');
    ta.value = prompt; ta.style.position='fixed'; ta.style.opacity='0';
    document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta);
    showToast('평가 프롬프트 복사됨!');
  });
}

function saveEvalResult() {
  const rawText = (document.getElementById('evalPasteInput')?.value||'').trim();
  if (!rawText) { showToast('AI 평가 결과를 붙여넣어 주세요', true); return; }

  // 등급 파싱
  const gradeMatch = rawText.match(/종합 등급[^
]*?([SABC])/);
  const totalMatch = rawText.match(/총점[^
]*?(\d+)/);
  const grade = gradeMatch ? gradeMatch[1] : 'B';
  const total = totalMatch ? parseInt(totalMatch[1]) : 0;

  const gc = {S:'#05C072',A:'#4CAF50',B:'#F59E0B',C:'#EF4444'}[grade]||'#05C072';

  const div = document.getElementById('evalDisplayResult');
  div.innerHTML = `
    <div class="grade-hero mt-16" style="border-color:${gc}30;background:${gc}08">
      <div class="grade-letter" style="color:${gc}">${grade}</div>
      <div class="grade-pts" style="color:${gc}">${total}점 <span class="grade-pts-max">/ 100점</span></div>
    </div>
    <div class="ml-card mt-12">
      <div class="card-eyebrow"><svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M4 19.5A2.5 2.5 0 0 1 6.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 0 1 4 19.5v-15A2.5 2.5 0 0 1 6.5 2z"/></svg>AI 평가 전문</div>
      <div class="card-body" style="white-space:pre-wrap;font-size:13px;line-height:1.7">${rawText}</div>
    </div>
    <div class="btn-row mt-16">
      <button class="btn-full" id="draftBtn">사업 초안 생성</button>
      <button class="btn-full secondary" id="casesBtn">유사 사례 탐구</button>
    </div>
    <div id="draftResult"></div>
  `;

  document.getElementById('draftBtn').addEventListener('click', genDraft);
  document.getElementById('casesBtn').addEventListener('click', () => goPage('cases'));
  showToast('평가 결과가 저장됐습니다 ✅');

  if (currentUser && currentAnalysis?.id) {
    db.collection(`users/${currentUser.uid}/evaluations`).add({
      analysisId: currentAnalysis.id, productName: currentAnalysis.productName,
      grade, total, rawText, createdAt: firebase.firestore.FieldValue.serverTimestamp()
    }).catch(()=>{});
    db.collection(`users/${currentUser.uid}/analyses`).doc(currentAnalysis.id).update({evaluated:true}).catch(()=>{});
  }
}


function fmtDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});
}
function showToast(msg, isErr=false) {
  const t = document.createElement('div');
  t.className = 'toast'+(isErr?' err':'');
  t.innerHTML = (isErr ? '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="10"/><line x1="15" y1="9" x2="9" y2="15"/><line x1="9" y1="9" x2="15" y2="15"/></svg>' : '<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polyline points="20 6 9 17 4 12"/></svg>') + msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => t.classList.add('show'));
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(),300); }, 2500);
}
</script>
