<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>MoneyLens</title>
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*{box-sizing:border-box;margin:0;padding:0}
:root{
  --green:#05C072;--green2:#03A861;--greenbg:#EDFBF4;--greenmid:rgba(5,192,114,0.2);
  --indigo:#4F6EF7;--indigobg:#EEF1FE;
  --amber:#F59E0B;--amberbg:#FFFBEB;
  --danger:#EF4444;--dangerbg:#FEF2F2;
  --text:#0F1117;--text2:#5A607A;--text3:#9BA3BF;
  --bg:#F4F6FA;--surface:#fff;--surface2:#F8F9FC;
  --border:#ECEEF4;--border2:#DDE0EB;
  --r:16px;--rsm:12px;--rxs:8px;
  --sh:0 2px 8px rgba(15,17,23,0.07);
}
html,body{height:100%;font-family:'Pretendard',-apple-system,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}

/* SCREENS */
.scr{display:none;height:100vh;flex-direction:column}
.scr.on{display:flex}

/* ONBOARDING */
#scrOb{background:#fff;align-items:stretch;justify-content:space-between}
.ob-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px 16px;text-align:center}
.ob-icon{width:96px;height:96px;border-radius:28px;background:var(--greenbg);display:flex;align-items:center;justify-content:center;margin:0 auto 32px;box-shadow:0 8px 28px rgba(5,192,114,0.18)}
.ob-icon svg{width:44px;height:44px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.ob-h{font-size:26px;font-weight:800;line-height:1.3;letter-spacing:-0.5px;margin-bottom:12px}
.ob-p{font-size:15px;color:var(--text2);line-height:1.75}
.ob-foot{padding:0 24px 44px}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:24px}
.dot{width:6px;height:6px;border-radius:3px;background:var(--border2);transition:all 0.3s}
.dot.on{width:22px;background:var(--green)}
.ob-btn{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--rsm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:12px}
.ob-skip{width:100%;padding:8px;background:none;border:none;color:var(--text3);font-size:14px;font-family:inherit;cursor:pointer}

/* AUTH */
#scrAuth{background:#fff;overflow-y:auto}
.auth-inner{padding:48px 24px 40px;max-width:420px;margin:0 auto;width:100%}
.auth-logo{display:flex;align-items:center;gap:8px;margin-bottom:28px}
.auth-logo-box{width:36px;height:36px;border-radius:10px;background:var(--greenbg);display:flex;align-items:center;justify-content:center}
.auth-logo-box svg{width:18px;height:18px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.auth-logo-name{font-size:18px;font-weight:800;color:var(--green)}
.auth-h{font-size:24px;font-weight:800;margin-bottom:4px;letter-spacing:-0.4px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:28px}
.field{margin-bottom:16px}
.field label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.inp{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-size:15px;font-family:inherit;outline:none;-webkit-appearance:none}
.inp:focus{border-color:var(--green);background:#fff}
.inp::placeholder{color:var(--text3)}
.err-box{display:none;background:var(--dangerbg);border:1px solid #FECACA;border-radius:var(--rxs);color:var(--danger);font-size:13px;padding:10px 14px;margin-bottom:14px;line-height:1.5}
.btn-pri{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:10px}
.btn-pri:active{background:var(--green2)}
.btn-sec{width:100%;padding:13px;background:none;border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text2);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-sec:active{border-color:var(--green);color:var(--green)}
.back-btn{display:flex;align-items:center;gap:4px;background:none;border:none;color:var(--text2);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;padding:0;margin-bottom:24px}

/* APP */
#scrApp{background:var(--bg)}
.topnav{background:#fff;border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;box-shadow:var(--sh)}
.brand-row{display:flex;align-items:center;gap:7px;padding:11px 0 8px}
.brand-box{width:26px;height:26px;border-radius:7px;background:var(--greenbg);display:flex;align-items:center;justify-content:center}
.brand-box svg{width:14px;height:14px;stroke:var(--green);fill:none;stroke-width:2;stroke-linecap:round;stroke-linejoin:round}
.brand-name{font-size:15px;font-weight:800;color:var(--text)}
.brand-tag{font-size:12px;color:var(--text3)}
.tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:0}
.tabs::-webkit-scrollbar{display:none}
.tab{flex-shrink:0;padding:9px 13px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text3);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;white-space:nowrap;transition:all 0.2s}
.tab.on{color:var(--green);border-bottom-color:var(--green)}
#main{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 36px}

/* CARDS */
.card{background:#fff;border-radius:var(--r);padding:16px;margin-bottom:12px;box-shadow:var(--sh);border:1px solid var(--border)}
.card.green-border{border-color:var(--green);border-width:1.5px}
.card.amber-bg{background:var(--amberbg);border-color:#FDE68A}
.clabel{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:7px}
.cbody{font-size:14px;color:var(--text2);line-height:1.7}

/* PAGE HERO */
.hero{margin-bottom:20px}
.hero-tag{display:inline-block;font-size:11px;font-weight:700;color:var(--green);background:var(--greenbg);border-radius:20px;padding:4px 10px;margin-bottom:8px}
.hero-h{font-size:25px;font-weight:800;line-height:1.25;letter-spacing:-0.5px}

/* SECTION LABEL */
.slabel{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.7px;margin-bottom:10px}

/* BUTTONS */
.btn-g{width:100%;padding:14px;background:var(--green);color:#fff;border:none;border-radius:var(--rsm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:12px}
.btn-g:active{background:var(--green2)}
.btn-gs{width:100%;padding:13px;background:var(--greenbg);color:var(--green);border:1.5px solid var(--greenmid);border-radius:var(--rsm);font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:10px}
.btn-outline{width:100%;padding:13px;background:none;border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text2);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:10px}
.btn-danger{width:100%;padding:13px;background:var(--dangerbg);color:var(--danger);border:1px solid #FECACA;border-radius:var(--rsm);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;margin-top:10px}
.btn-sm-g{padding:9px 13px;background:var(--greenbg);color:var(--green);border:none;border-radius:var(--rxs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-sm-r{padding:9px 13px;background:var(--dangerbg);color:var(--danger);border:none;border-radius:var(--rxs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer}
.btn-row{display:flex;gap:8px;margin-top:12px}
.btn-row .btn-g,.btn-row .btn-gs{margin-top:0;flex:1}

/* MODE TABS */
.mtabs{display:flex;gap:6px;margin-bottom:12px}
.mtab{flex:1;padding:9px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rxs);color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
.mtab.on{background:var(--greenbg);border-color:var(--green);color:var(--green)}

/* INPUTS */
.ta{width:100%;padding:12px 13px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:inherit;font-size:14px;resize:none;min-height:110px;line-height:1.65;outline:none;-webkit-appearance:none}
.ta:focus{border-color:var(--green);background:#fff}
.ta::placeholder{color:var(--text3)}
.ta.sm{min-height:80px}
.ta.md{min-height:150px}
.ifield{width:100%;padding:12px 13px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--rsm);color:var(--text);font-family:inherit;font-size:14px;outline:none;-webkit-appearance:none}
.ifield:focus{border-color:var(--green);background:#fff}
.ifield::placeholder{color:var(--text3)}

/* IMG DROP */
.imgdrop{border:2px dashed var(--border2);border-radius:var(--rsm);padding:28px 16px;text-align:center;cursor:pointer;background:var(--surface2)}
.imgdrop:active{border-color:var(--green)}
.imgdrop-t{font-size:14px;font-weight:600;color:var(--text2);margin-bottom:4px}
.imgdrop-s{font-size:12px;color:var(--text3)}

/* AI GUIDE */
.ai-guide{background:var(--surface2);border:1px solid var(--border);border-radius:var(--rsm);padding:14px;margin-top:12px}
.ai-guide-t{font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px}
.ai-step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2);margin-bottom:7px}
.ai-step-n{width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-links{display:flex;gap:8px;flex-wrap:wrap;margin-top:10px}
.ai-link{display:inline-block;font-size:12px;font-weight:700;color:var(--indigo);background:var(--indigobg);border-radius:20px;padding:5px 12px;text-decoration:none}
.ai-photo{font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5}
.paste-hint{font-size:13px;color:var(--text2);margin-bottom:8px;line-height:1.5}

/* HINTS */
.hgrid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:12px}
.hcard{background:#fff;border:1px solid var(--border);border-radius:var(--rsm);padding:12px;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--sh)}
.hcard:active{border-color:var(--green)}
.hemoji{font-size:18px}
.htxt{font-size:12px;font-weight:600;color:var(--text2);line-height:1.3}

/* RESULT */
.rtitle-row{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.rname{font-size:19px;font-weight:800;letter-spacing:-0.4px}
.rtag{font-size:11px;font-weight:700;background:var(--greenbg);color:var(--green);border-radius:20px;padding:4px 10px}
.opp-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:8px}
.opp-dot{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px}
.opp-txt{font-size:14px;line-height:1.55}
.idea-item{display:flex;gap:11px;background:#fff;border:1px solid var(--border);border-radius:var(--rsm);padding:13px;margin-bottom:10px;box-shadow:var(--sh)}
.idea-n{width:26px;height:26px;border-radius:50%;background:var(--greenbg);color:var(--green);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.idea-b .ititle{font-size:14px;font-weight:700;margin-bottom:5px}
.idea-b .idesc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:6px}
.idea-b .irev{font-size:12px;font-weight:600;color:var(--green2);background:var(--greenbg);border-radius:5px;padding:3px 8px;display:inline-block}
.warn-strip{background:var(--amberbg);border:1px solid #FDE68A;border-radius:var(--rxs);padding:10px 13px;font-size:12px;color:#92400E;margin:12px 0;line-height:1.5}

/* STATS */
.srow{display:flex;gap:8px;margin-bottom:14px}
.sbox{flex:1;background:#fff;border:1px solid var(--border);border-radius:var(--rsm);padding:13px 10px;text-align:center;box-shadow:var(--sh)}
.snum{font-size:21px;font-weight:800;color:var(--green)}
.snum.sm{font-size:12px;font-weight:700;padding-top:4px;line-height:1.4}
.slbl{font-size:11px;color:var(--text3);margin-top:3px}

/* IDEA LIST */
.icard{background:#fff;border:1px solid var(--border);border-radius:var(--r);padding:15px;margin-bottom:10px;box-shadow:var(--sh);cursor:pointer}
.icard:active{border-color:var(--green)}
.ic-row{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ic-name{font-size:15px;font-weight:700;margin-bottom:4px}
.ic-prev{font-size:13px;color:var(--text3);line-height:1.4}
.ic-right{display:flex;flex-direction:column;align-items:flex-end;gap:4px;flex-shrink:0}
.badge{font-size:11px;font-weight:700;border-radius:20px;padding:3px 8px}
.badge.g{background:var(--greenbg);color:var(--green)}
.badge.gr{background:var(--bg);color:var(--text3);border:1px solid var(--border2)}
.ic-date{font-size:11px;color:var(--text3)}
.ic-detail{display:none;margin-top:12px;padding-top:12px;border-top:1px solid var(--border)}
.dk{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.dv{font-size:13px;color:var(--text2);line-height:1.5;margin-bottom:10px}
.dv.hl{color:var(--text);font-weight:600}
.dact{display:flex;gap:8px;margin-top:10px}

/* EVAL */
.selbar{background:var(--greenbg);border:1.5px solid var(--greenmid);border-radius:var(--rsm);padding:12px 14px;margin-bottom:12px}
.selbar-lbl{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;margin-bottom:3px}
.selbar-name{font-size:14px;font-weight:700}
.notice{display:flex;gap:11px;align-items:flex-start;background:var(--amberbg);border:1px solid #FDE68A;border-radius:var(--rsm);padding:13px;margin-bottom:12px}
.notice-t{font-size:13px;font-weight:700;margin-bottom:3px}
.notice-d{font-size:12px;color:var(--text2);line-height:1.5}
.notice-a{background:none;border:none;color:var(--amber);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;padding:0;margin-top:6px;display:block;text-decoration:underline}
.etags{display:flex;flex-wrap:wrap;gap:6px;margin-top:8px}
.etag{font-size:12px;font-weight:600;color:var(--indigo);background:var(--indigobg);border-radius:20px;padding:4px 10px}
.grade-box{border-radius:var(--r);padding:26px 20px;text-align:center;margin-bottom:12px;border:1.5px solid}
.grade-ltr{font-size:68px;font-weight:800;line-height:1;letter-spacing:-2px}
.grade-pts{font-size:20px;font-weight:700;margin-top:4px}
.grade-max{font-size:13px;color:var(--text3)}

/* SETTINGS */
.pcard{display:flex;align-items:center;gap:13px}
.avatar{width:48px;height:48px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--indigo));color:#fff;font-size:19px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.pname{font-size:15px;font-weight:700}
.pemail{font-size:13px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.logout-btn{margin-left:auto;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--rxs);padding:7px 13px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text2);cursor:pointer;flex-shrink:0}
.fgroup{margin-bottom:14px}
.fgroup label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:6px}
.danger-note{font-size:12px;color:var(--text3);text-align:center;margin-top:8px}

/* EMPTY */
.empty{text-align:center;padding:54px 24px}
.empty-icon{width:68px;height:68px;border-radius:18px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 16px}
.empty-icon svg{width:30px;height:30px;stroke:var(--text3);fill:none;stroke-width:1.5;stroke-linecap:round;stroke-linejoin:round}
.empty-h{font-size:16px;font-weight:700;margin-bottom:7px}
.empty-d{font-size:14px;color:var(--text3);line-height:1.65}
.empty-btn{display:inline-block;background:var(--green);color:#fff;border:none;border-radius:var(--rsm);padding:11px 22px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:18px}

/* TOAST */
.toast{position:fixed;bottom:26px;left:50%;transform:translateX(-50%) translateY(14px);background:var(--text);color:#fff;padding:10px 18px;border-radius:22px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all 0.25s;white-space:nowrap;max-width:88vw;pointer-events:none;box-shadow:var(--sh)}
.toast.on{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.red{background:var(--danger)}

/* UTILS */
.mt8{margin-top:8px}.mt12{margin-top:12px}.mt16{margin-top:16px}.mt20{margin-top:20px}.mt24{margin-top:24px}
.divider{height:1px;background:var(--border);margin:14px 0}
@media(min-width:480px){body{background:#E8EAF0}.scr{max-width:480px;margin:0 auto;box-shadow:0 0 40px rgba(0,0,0,0.12)}}
@media(orientation:landscape) and (max-height:500px){.ob-h{font-size:21px}.ob-body{padding:20px 32px 12px}.hero-h{font-size:21px}.card{padding:12px}}
</style>
</head>
<body>

<!-- ONBOARDING -->
<div id="scrOb" class="scr on">
  <div class="ob-body">
    <div class="ob-icon" id="obIcon">
      <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    </div>
    <h1 class="ob-h" id="obH">상품을 보는 눈이<br>달라집니다</h1>
    <p class="ob-p" id="obP">편의점 삼각김밥, 스타벅스 커피, 배달앱<br>일상의 모든 것이 사업 아이디어가 됩니다</p>
  </div>
  <div class="ob-foot">
    <div class="ob-dots" id="obDots">
      <div class="dot on"></div><div class="dot"></div><div class="dot"></div>
    </div>
    <button class="ob-btn" id="obNext">다음</button>
    <button class="ob-skip" id="obSkip">건너뛰기</button>
  </div>
</div>

<!-- AUTH -->
<div id="scrAuth" class="scr">
  <div class="auth-inner" id="authInner"></div>
</div>

<!-- APP -->
<div id="scrApp" class="scr">
  <div class="topnav">
    <div class="brand-row">
      <div class="brand-box">
        <svg viewBox="0 0 24 24"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
      </div>
      <span class="brand-name">MoneyLens</span>
      <span class="brand-tag">돈 벌 생각</span>
    </div>
    <div class="tabs" id="tabs">
      <button class="tab on" data-p="lens">렌즈</button>
      <button class="tab" data-p="ideas">아이디어함</button>
      <button class="tab" data-p="eval">평가실</button>
      <button class="tab" data-p="cases">사례</button>
      <button class="tab" data-p="settings">설정</button>
    </div>
  </div>
  <div id="main"></div>
</div>

<script>
// ── FIREBASE ──────────────────────────────────────
firebase.initializeApp({
  apiKey:"AIzaSyBujxf8knm_dolV2cDD_nuxMI9hucXD5ys",
  authDomain:"moneylens-e8557.firebaseapp.com",
  projectId:"moneylens-e8557",
  storageBucket:"moneylens-e8557.firebasestorage.app",
  messagingSenderId:"1085597108252",
  appId:"1:1085597108252:web:a340c8ebc84e153b4037d9"
});
var auth = firebase.auth();
var db   = firebase.firestore();
var TS   = firebase.firestore.FieldValue.serverTimestamp;

// ── STATE ─────────────────────────────────────────
var user     = null;
var profile  = null;
var analysis = null;
var obStep   = 0;

// ── SCREEN ────────────────────────────────────────
function show(id) {
  var screens = document.querySelectorAll('.scr');
  for (var i = 0; i < screens.length; i++) screens[i].classList.remove('on');
  document.getElementById(id).classList.add('on');
}

// ── ONBOARDING ────────────────────────────────────
var obData = [

function fmtDate(ts) {

}

function toast(msg, isErr) {
  var t = document.createElement('div');
  t.className = 'toast' + (isErr ? ' red' : '');
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(function() { t.classList.add('on'); }, 10);
  setTimeout(function() {
    t.classList.remove('on');
    setTimeout(function() { t.parentNode && t.parentNode.removeChild(t); }, 300);
  }, 2500);
}

function el(tag, cls, html) {
  var e = document.createElement(tag);
  if (cls) e.className = cls;
  if (html !== undefined) e.innerHTML = html;
  return e;
}

function copyText(txt, msg) {
  if (navigator.clipboard && window.isSecureContext) {
    navigator.clipboard.writeText(txt).then(function() { toast(msg); }).catch(function() { fallbackCopy(txt, msg); });
  } else { fallbackCopy(txt, msg); }
}

function fallbackCopy(txt, msg) {
  var ta = document.createElement('textarea');
  ta.value = txt;
  ta.style.cssText = 'position:fixed;top:0;left:0;opacity:0';
  document.body.appendChild(ta);
  ta.focus(); ta.select();
  try { document.execCommand('copy'); } catch(e) {}
  document.body.removeChild(ta);
  toast(msg);
}

function buildPrompt(input, mode) {
  var modeLabel = mode === 1 ? '이미지 첨부 상품' : (mode === 2 ? 'URL: ' : '') + input;

    '아래 상품/서비스를 분석하여 돈이 되는 기회를 발견해주세요.\n' +
    '추정값은 반드시 ✅확인됨 / ⚠️추정 / ❓불확실 로 표기해주세요.\n\n' +
    '[분석 대상]\n' + modeLabel + profileCtx() + '\n\n' +
    '아래 6가지 항목을 순서대로 분석해주세요:\n\n' +
    '1. 📋 상품 개요\n(무엇인가, 왜 만들어졌나 - 2~3문장)\n\n' +
    '2. 🏭 생산 구조\n(어디서 어떻게 만들어지나, 원가 추정 - 신뢰도 표기)\n\n' +
    '3. 🚚 유통 경로\n(제조→도매→소매 구조, 각 단계 마진 추정)\n\n' +
    '4. 📊 시장 규모\n(국내/글로벌 추정)\n\n' +
    '5. 💡 기회 포인트\n(개선/틈새/사업 기회 3가지를 각각 한 줄로)\n\n' +
    '6. 💰 돈 되는 아이디어 3가지\n각 아이디어마다:\n- 아이디어명:\n- 설명: (2~3문장)\n- 수익 모델:';
}

function parseAnalysis(raw) {
  function sect(rx) { var m = raw.match(rx); return m ? m[1].trim() : ''; }
  var overview  = sect(/1\.\s*📋[^\n]*\n([\s\S]*?)(?=2\.|$)/);
  var production= sect(/2\.\s*🏭[^\n]*\n([\s\S]*?)(?=3\.|$)/);
  var distrib   = sect(/3\.\s*🚚[^\n]*\n([\s\S]*?)(?=4\.|$)/);
  var market    = sect(/4\.\s*📊[^\n]*\n([\s\S]*?)(?=5\.|$)/);
  var oppRaw    = sect(/5\.\s*💡[^\n]*\n([\s\S]*?)(?=6\.|$)/);
  var opps = oppRaw.split('\n').map(function(l) { return l.replace(/^[-•*\d.]+\s*/, '').trim(); }).filter(function(l) { return l.length > 5; }).slice(0, 3);
  var ideaRaw = sect(/6\.\s*💰[^\n]*\n([\s\S]*?)$/);
  var ideas = [];
  if (ideaRaw) {
    var blocks = ideaRaw.split(/(?=아이디어명[：:])/);
    for (var i = 0; i < blocks.length; i++) {
      var b = blocks[i];
      var tm = b.match(/아이디어명[：:]\s*([^\n]+)/);
      var dm = b.match(/설명[：:]\s*([\s\S]*?)(?=수익 모델|$)/);
      var rm = b.match(/수익 모델[：:]\s*([^\n]+)/);
      if (tm) ideas.push({ title: tm[1].trim(), desc: dm ? dm[1].trim() : '', rev: rm ? rm[1].trim() : '' });
    }
  }
  return {
    productName: analysis ? analysis.inputContent : '분석 결과',
    inputContent: analysis ? analysis.inputContent : '',
    overview: overview, production: production,
    distribution: distrib, market: market,
    opportunities: opps, ideas: ideas,
    rawText: raw,
    reliabilityNote: 'AI 분석 결과입니다. 중요한 의사결정 전 수치를 직접 검증해주세요.'
  };
}

function renderAnalysis(container, r) {

function saveAnalysis(r) {
  if (!r) { toast('분석 결과가 없습니다', true); return; }
  var data = {
    productName: r.productName || '', inputContent: r.inputContent || '',
    overview: r.overview || '', production: r.production || '',
    distribution: r.distribution || '', market: r.market || '',
    opportunities: r.opportunities || [], ideas: r.ideas || [],
    rawText: r.rawText || '', myIdea: r.myIdea || '',
    reliabilityNote: r.reliabilityNote || '',
    savedAt: TS(), evaluated: false
  };
  db.collection('users/' + user.uid + '/analyses').add(data).then(function(ref) {
    if (analysis) analysis.id = ref.id;
    toast('아이디어함에 저장됐습니다 ✅');
  }).catch(function(e) { toast('저장 실패: ' + e.message, true); });
}

          '<div><div class="ic-name">' + (a.productName || a.inputContent || '분석 결과') + '</div>' +

      '각 사례를 아래 형식으로 작성해주세요:\n\n' +
      '### 사례 N: [회사/서비스명] (국내/해외 · 성공/실패)\n' +
      '- 핵심 전략:\n- 성공/실패 이유:\n- 💡 내 아이디어에 주는 시사점:';
    copyText(p, '사례탐구 프롬프트 복사됨!');
    pasteArea.innerHTML = '<div class="slabel">AI 사례 결과 붙여넣기</div>';
    var pc = el('div', 'card');
    pc.appendChild(aiLinksDiv());
    var pta = el('textarea', 'ta md mt12');
    pta.id = 'casesPasteTa';
    pta.placeholder = 'AI가 찾은 사례를 여기에 붙여넣어 주세요...';
    var saveBtn = el('button', 'btn-g mt12', '사례 저장하기');
    saveBtn.onclick = function() {
      var raw = (document.getElementById('casesPasteTa').value || '').trim();
      if (!raw) { toast('사례를 붙여넣어 주세요', true); return; }
      resultDiv.innerHTML = '';
      var rc = el('div', 'card green-border mt12');
      rc.innerHTML = '<div class="clabel">저장된 사례</div><div class="cbody" style="white-space:pre-wrap;font-size:13px;line-height:1.7">' + raw + '</div>';
      resultDiv.appendChild(rc);
      pasteArea.style.display = 'none';
      toast('사례가 저장됐습니다 ✅');
    };
    pc.appendChild(pta);
    pc.appendChild(saveBtn);
    pasteArea.appendChild(pc);
    pasteArea.style.display = 'block';
  };
}

// ── SETTINGS ──────────────────────────────────────
function pgSettings(main) {
  main.innerHTML = '';
  var hero = el('div', 'hero');
  hero.innerHTML = '<div class="hero-tag">설정</div><h1 class="hero-h">내 계정</h1>';
  main.appendChild(hero);

  var uname = (user && user.displayName) || (user && user.email && user.email.split('@')[0]) || '사용자';
  var uemail = (user && user.email) || '';
  var initial = uname.charAt(0).toUpperCase();
  var p = profile || {};

  var ucard = el('div', 'card');
  ucard.innerHTML = '<div class="pcard"><div class="avatar">' + initial + '</div>' +
    '<div style="flex:1;min-width:0"><div class="pname">' + uname + '</div><div class="pemail">' + uemail + '</div></div>' +
    '<button class="logout-btn" id="logoutBtn">로그아웃</button></div>';
  main.appendChild(ucard);

  document.getElementById('logoutBtn').onclick = function() {
    if (!confirm('로그아웃 하시겠습니까?')) return;
    auth.signOut();
  };

  var plabel = el('div', 'slabel mt24', '내 프로필');
  main.appendChild(plabel);

  var pcard = el('div', 'card');
  pcard.innerHTML = '<div style="font-size:13px;color:var(--text3);margin-bottom:14px;line-height:1.5">입력할수록 평가실이 나에게 맞게 조정됩니다</div>' +
    '<div class="fgroup"><label>보유 역량 · 전문성</label><input id="pSkills" type="text" class="ifield" value="' + (p.skills||'') + '" placeholder="예) 마케팅, 교육, IT, 영업, 기획..."></div>' +
    '<div class="fgroup"><label>가용 초기 자본</label><select id="pCapital" class="ifield">' +
      '<option value="">선택해주세요</option>' +
      ['100만원 미만','100~500만원','500만~1천만원','1천만~5천만원','5천만원 이상'].map(function(v){
        return '<option value="' + v + '"' + (p.capital===v?' selected':'') + '>' + v + '</option>';
      }).join('') + '</select></div>' +
    '<div class="fgroup"><label>주당 가용 시간</label><select id="pTime" class="ifield">' +
      '<option value="">선택해주세요</option>' +
      ['5시간 미만 (부업)','5~15시간 (사이드프로젝트)','15~30시간 (병행창업)','풀타임 (전업)'].map(function(v){
        return '<option value="' + v + '"' + (p.time===v?' selected':'') + '>' + v + '</option>';
      }).join('') + '</select></div>' +
    '<div class="fgroup"><label>관심 산업</label><input id="pIndustry" type="text" class="ifield" value="' + (p.industry||'') + '" placeholder="예) 식품, 교육, IT, 커머스, 콘텐츠..."></div>';

  var saveBtn = el('button', 'btn-g', '프로필 저장');
  saveBtn.onclick = function() {
    saveProfile({
      skills:   (document.getElementById('pSkills').value   || ''),
      capital:  (document.getElementById('pCapital').value  || ''),
      time:     (document.getElementById('pTime').value     || ''),
      industry: (document.getElementById('pIndustry').value || '')
    });
  };
  pcard.appendChild(saveBtn);
  main.appendChild(pcard);

  var dlabel = el('div', 'slabel mt24', '데이터 관리');
  main.appendChild(dlabel);
  var dcard = el('div', 'card');
  var delBtn = el('button', 'btn-danger', '전체 데이터 삭제');
  delBtn.onclick = function() {
    if (!confirm('모든 분석 데이터를 삭제합니다. 계속하시겠습니까?')) return;
    var col1 = db.collection('users/' + user.uid + '/analyses').get();
    var col2 = db.collection('users/' + user.uid + '/evaluations').get();
    Promise.all([col1, col2]).then(function(results) {
      var dels = [];
      results[0].docs.forEach(function(d) { dels.push(d.ref.delete()); });
      results[1].docs.forEach(function(d) { dels.push(d.ref.delete()); });
      return Promise.all(dels);
    }).then(function() { toast('모든 데이터가 삭제됐습니다'); })
      .catch(function() { toast('삭제 실패', true); });
  };
  dcard.appendChild(delBtn);
  dcard.innerHTML += '<div class="danger-note">삭제된 데이터는 복구할 수 없습니다</div>';
  main.appendChild(dcard);
}
</script>
