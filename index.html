const firebaseConfig = {
  apiKey: "AIzaSyBujxf8knm_dolV2cDD_nuxMI9hucXD5ys",

  projectId: "moneylens-e8557",
  storageBucket: "moneylens-e8557.firebasestorage.app",
  messagingSenderId: "1085597108252",
  appId: "1:1085597108252:web:a340c8ebc84e153b4037d9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);

let currentUser = null;
let userProfile = null;
let currentAnalysis = null;
let currentPage = 'lens';
let radarChart = null;
let onboardingStep = 0;

// ─── AUTH STATE ────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    showScreen('app');
    await loadUserProfile();
    renderPage('lens');
  } else {
    showScreen('onboarding');
  }
});

function showScreen(name) {
  document.querySelectorAll('.screen').forEach(s => s.style.display = 'none');
  document.getElementById(name + 'Screen').style.display = name === 'app' ? 'flex' : 'block';
}

// ─── ONBOARDING ────────────────────────────────────────
const slides = [
  {
    emoji: '🔍',
    title: '상품을 보는 눈이\n달라집니다',
    desc: '편의점 삼각김밥, 스타벅스 커피, 배달앱…\n일상의 모든 것이 사업 아이디어가 됩니다'
  },
  {
    emoji: '🏭',
    title: '원가부터 유통까지\nAI가 해부합니다',
    desc: '생산 구조, 유통 마진, 시장 규모를\n한눈에 파악하세요'
  },
  {
    emoji: '💰',
    title: '기회를 발견하고\n사업으로 만드세요',
    desc: '실현가능성 평가부터 사업 초안까지\n돈 버는 생각을 실행으로'
  }
];

window.nextOnboarding = function() {
  if (onboardingStep < slides.length - 1) {
    onboardingStep++;
    renderOnboardingSlide();
  } else {
    showAuthPanel('login');
  }
};

window.skipOnboarding = function() {
  showAuthPanel('login');
};

function renderOnboardingSlide() {
  const s = slides[onboardingStep];
  document.getElementById('obEmoji').textContent = s.emoji;
  document.getElementById('obTitle').innerHTML = s.title.replace('\n', '<br>');
  document.getElementById('obDesc').innerHTML = s.desc.replace('\n', '<br>');
  document.querySelectorAll('.ob-dot').forEach((d, i) => {
    d.classList.toggle('active', i === onboardingStep);
  });
  const btn = document.getElementById('obNextBtn');
  btn.textContent = onboardingStep < slides.length - 1 ? '다음' : '시작하기';
  const skip = document.getElementById('obSkip');
  skip.style.visibility = onboardingStep < slides.length - 1 ? 'visible' : 'hidden';
}

function showAuthPanel(mode) {
  document.getElementById('onboardingSlide').style.display = 'none';
  document.getElementById('authPanel').style.display = 'block';
  if (mode === 'login') renderLogin();
  else renderSignup();
}

function renderLogin() {
  document.getElementById('authPanel').innerHTML = `
    <div class="auth-top">
      <div class="auth-logo">🔍</div>
      <div class="auth-brand">MoneyLens</div>
      <div class="auth-sub">돈 벌 생각</div>
    </div>
    <div class="auth-form">
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="authEmail" class="toss-input" placeholder="이메일을 입력하세요" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="authPw" class="toss-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password">
      </div>
      <div id="authError" class="auth-error" style="display:none"></div>
      <button class="toss-btn primary" onclick="doLogin()">로그인</button>
      <button class="toss-btn ghost" onclick="showAuthPanel('signup')">처음 오셨나요? 회원가입</button>
    </div>
  `;
}

function renderSignup() {
  document.getElementById('authPanel').innerHTML = `
    <div class="auth-top">
      <button class="back-btn" onclick="showAuthPanel('login')">← 로그인으로</button>
      <div class="auth-logo" style="margin-top:8px">🔍</div>
      <div class="auth-brand">MoneyLens</div>
      <div class="auth-sub">계정을 만들어 시작하세요</div>
    </div>
    <div class="auth-form">
      <div class="form-group">
        <label class="form-label">이름</label>
        <input type="text" id="authName" class="toss-input" placeholder="이름을 입력하세요">
      </div>
      <div class="form-group">
        <label class="form-label">이메일</label>
        <input type="email" id="authEmail" class="toss-input" placeholder="이메일을 입력하세요" autocomplete="email">
      </div>
      <div class="form-group">
        <label class="form-label">비밀번호</label>
        <input type="password" id="authPw" class="toss-input" placeholder="6자 이상 입력하세요" autocomplete="new-password">
      </div>
      <div id="authError" class="auth-error" style="display:none"></div>
      <button class="toss-btn primary" onclick="doSignup()">회원가입</button>
    </div>
  `;
}

window.doLogin = async function() {
  const email = document.getElementById('authEmail')?.value?.trim();
  const pw = document.getElementById('authPw')?.value;
  const errEl = document.getElementById('authError');
  if (!email || !pw) { showAuthError('이메일과 비밀번호를 입력해주세요'); return; }
  try {
    await signInWithEmailAndPassword(auth, email, pw);
  } catch(e) {
    const msg = e.code === 'auth/invalid-credential' ? '이메일 또는 비밀번호가 올바르지 않습니다'
      : e.code === 'auth/user-not-found' ? '등록되지 않은 이메일입니다'
      : e.code === 'auth/wrong-password' ? '비밀번호가 올바르지 않습니다'
      : '로그인 실패: ' + e.message;
    showAuthError(msg);
  }
};

window.doSignup = async function() {
  const name = document.getElementById('authName')?.value?.trim();
  const email = document.getElementById('authEmail')?.value?.trim();
  const pw = document.getElementById('authPw')?.value;
  if (!name || !email || !pw) { showAuthError('모든 항목을 입력해주세요'); return; }
  if (pw.length < 6) { showAuthError('비밀번호는 6자 이상이어야 합니다'); return; }
  try {
    const cred = await createUserWithEmailAndPassword(auth, email, pw);
    await updateProfile(cred.user, { displayName: name });
  } catch(e) {
    const msg = e.code === 'auth/email-already-in-use' ? '이미 사용 중인 이메일입니다'
      : e.code === 'auth/invalid-email' ? '이메일 형식이 올바르지 않습니다'
      : '회원가입 실패: ' + e.message;
    showAuthError(msg);
  }
};

function showAuthError(msg) {
  const el = document.getElementById('authError');
  if (el) { el.textContent = msg; el.style.display = 'block'; }
}

window.logout = async function() {
  if (!confirm('로그아웃 하시겠습니까?')) return;
  await signOut(auth);
};

// ─── PROFILE ──────────────────────────────────────────
async function loadUserProfile() {
  try {
    const snap = await getDocs(collection(db, `users/${currentUser.uid}/profile`));
    userProfile = snap.empty ? null : snap.docs[0].data();
  } catch(e) { userProfile = null; }
}

async function saveProfile(data) {
  try {
    const snap = await getDocs(collection(db, `users/${currentUser.uid}/profile`));
    if (!snap.empty) {
      await updateDoc(doc(db, `users/${currentUser.uid}/profile`, snap.docs[0].id), data);
    } else {
      await addDoc(collection(db, `users/${currentUser.uid}/profile`), data);
    }
    userProfile = data;
    showToast('프로필이 저장되었습니다');
  } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
}

// ─── NAVIGATION ───────────────────────────────────────
window.renderPage = function(page) {
  currentPage = page;
  document.querySelectorAll('.top-tab').forEach(b => b.classList.remove('active'));
  document.querySelector(`.top-tab[data-tab="${page}"]`)?.classList.add('active');
  renderPageContent(page);
};

function renderPageContent(page) {
  const main = document.getElementById('mainContent');
  main.scrollTop = 0;
  if (page === 'lens') renderLens(main);
  else if (page === 'ideas') renderIdeas(main);
  else if (page === 'eval') renderEval(main);
  else if (page === 'cases') renderCases(main);
  else if (page === 'settings') renderSettings(main);
}

function buildTopNav() {
  return `
  <header class="top-nav">
    <div class="top-nav-brand">
      <span class="brand-icon">🔍</span>
      <span class="brand-name">MoneyLens</span>
    </div>
    <nav class="top-tabs">

      <button class="top-tab" data-tab="eval" onclick="renderPage('eval')">평가실</button>
      <button class="top-tab" data-tab="cases" onclick="renderPage('cases')">사례</button>

// ─── LENS PAGE ────────────────────────────────────────
function renderLens(main) {
  main.innerHTML = `
    <div class="page-hero">
      <div class="hero-eyebrow">돈 벌 생각</div>
      <h1 class="hero-title">상품을 보는 눈이<br>달라지면 돈이 보입니다</h1>
    </div>

    <div class="toss-card">
      <div class="input-mode-tabs">
        <button class="mode-tab active" onclick="switchMode('text',this)">텍스트</button>
        <button class="mode-tab" onclick="switchMode('image',this)">이미지</button>
        <button class="mode-tab" onclick="switchMode('url',this)">URL</button>
      </div>

      <div id="modeText" class="mode-panel">
        <textarea id="textInput" class="toss-textarea" placeholder="분석할 상품이나 서비스를 입력하세요&#10;예) 편의점 삼각김밥, 스타벅스 아메리카노, 쿠팡 로켓배송..."></textarea>
      </div>
      <div id="modeImage" class="mode-panel" style="display:none">
        <div class="image-upload-area" onclick="document.getElementById('imgFile').click()">

            <div class="upload-icon">📷</div>

            <div class="upload-sub">상품 사진, 영수증, 패키지 등</div>
          </div>

        <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="previewImg(this)">
      </div>
      <div id="modeUrl" class="mode-panel" style="display:none">
        <input type="url" id="urlInput" class="toss-input" placeholder="쿠팡, 네이버쇼핑, 배민 등 URL 붙여넣기" style="margin:0">
      </div>

      <button class="toss-btn primary full-width mt-16" onclick="startAnalysis()">

      </button>

      </div>
      <div class="hint-card" onclick="fillExample('스타벅스 아메리카노')">
        <div class="hint-emoji">☕</div>
        <div class="hint-text">스타벅스 아메리카노</div>

      <div class="hint-card" onclick="fillExample('배달앱 서비스')">
        <div class="hint-emoji">📱</div>

      </div>
      <div class="hint-card" onclick="fillExample('요가매트')">

        <div class="hint-text">요가매트</div>

window.fillExample = function(text) {
  const el = document.getElementById('textInput');
  if (el) { el.value = text; el.focus(); }
  // Ensure text mode is active
  document.querySelectorAll('.mode-tab').forEach((b,i) => b.classList.toggle('active', i===0));
  document.querySelectorAll('.mode-panel').forEach((p,i) => p.style.display = i===0 ? 'block' : 'none');
};

window.switchMode = function(type, btn) {
  document.querySelectorAll('.mode-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.mode-panel').forEach(p => p.style.display = 'none');
  document.getElementById('mode' + type.charAt(0).toUpperCase() + type.slice(1)).style.display = 'block';
};

window.previewImg = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imgPreviewWrap').innerHTML =
      `<img src="${e.target.result}" style="max-width:100%;max-height:180px;border-radius:8px;object-fit:contain">`;
  };
  reader.readAsDataURL(file);
};

window.startAnalysis = async function() {
  const activeMode = document.querySelector('.mode-tab.active')?.textContent;
  let inputContent = '', inputType = 'text', imageBase64 = null;

  if (activeMode === '텍스트') {
    inputContent = document.getElementById('textInput')?.value?.trim();
    inputType = 'text';
  } else if (activeMode === '이미지') {
    const file = document.getElementById('imgFile')?.files[0];
    if (!file) { showToast('이미지를 선택해주세요', 'error'); return; }
    inputContent = file.name;
    inputType = 'image';
    imageBase64 = await fileToBase64(file);
  } else {
    inputContent = document.getElementById('urlInput')?.value?.trim();
    inputType = 'url';
  }
  if (!inputContent) { showToast('분석할 내용을 입력해주세요', 'error'); return; }

  const resultDiv = document.getElementById('analysisResult');
  resultDiv.innerHTML = `
    <div class="toss-card mt-16">
      <div class="loading-header">
        <div class="loading-spinner"></div>
        <div class="loading-title">AI가 분석하고 있습니다</div>
      </div>
      <div class="loading-steps">
        ${['상품 개요 파악','생산 구조 분석','유통 경로 추적','시장 규모 추정','기회 포인트 탐색','아이디어 생성'].map((s,i) =>
          `<div class="l-step" id="ls${i}">${s}</div>`
        ).join('')}
      </div>
    </div>`;

  [0,1,2,3,4,5].forEach(i => {
    setTimeout(() => {
      const el = document.getElementById(`ls${i}`);
      if (el) el.classList.add('done');
    }, (i + 1) * 700);
  });

  try {
    const profileCtx = userProfile
      ? `\n사용자 프로필: 역량(${userProfile.skills||'미입력'}), 자본(${userProfile.capital||'미입력'}), 관심산업(${userProfile.industry||'미입력'}), 가용시간(${userProfile.time||'미입력'})\n적합도 분석 시 이 프로필을 반영해주세요.` : '';

    const messages = imageBase64
      ? [{ role:"user", content:[
          { type:"image", source:{ type:"base64", media_type:"image/jpeg", data:imageBase64 }},
          { type:"text", text:`이 상품 이미지를 분석해주세요.${profileCtx}` }
        ]}]
      : [{ role:"user", content:`분석 대상: ${inputType==='url'?'URL: ':''}${inputContent}${profileCtx}` }];

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{ "Content-Type":"application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        system: `당신은 비즈니스 역공학(reverse engineering) 전문가입니다.
사용자가 입력한 상품/서비스를 분석하여 돈이 되는 기회를 발견하도록 도와줍니다.
모든 분석은 한국어로, 구체적 수치와 함께 제공하세요.
추정값은 반드시 신뢰도를 표기하세요: ✅확인됨 / ⚠️추정 / ❓불확실
응답은 반드시 순수 JSON만 출력하세요. 마크다운 없이.

응답 형식:
{
  "productName": "상품명",
  "overview": "상품 개요 2~3문장",
  "production": "생산 구조 및 원가 추정 (신뢰도 표기 포함)",
  "distribution": "유통 경로 및 마진 구조",
  "market": "시장 규모 추정 (국내/글로벌)",
  "opportunities": ["기회1", "기회2", "기회3"],
  "ideas": [
    {"title":"아이디어 제목","description":"구체적 설명 2~3문장","revenueModel":"수익 모델"}
  ],
  "reliabilityNote": "분석 신뢰도 전반 코멘트 1문장"
}`,
        messages
      })
    });
    const data = await res.json();
    let text = (data.content||[]).map(i=>i.text||'').join('');
    text = text.replace(/```json|```/g,'').trim();
    const result = JSON.parse(text);
    currentAnalysis = { ...result, inputContent, inputType, timestamp: new Date().toISOString() };
    renderAnalysisResult(resultDiv, result);
  } catch(e) {
    resultDiv.innerHTML = `<div class="toss-card mt-16 error-state">
      <div class="error-icon">⚠️</div>
      <div class="error-msg">분석 중 오류가 발생했습니다</div>
      <div class="error-detail">${e.message}</div>
    </div>`;
  }
};

      <span class="result-badge">AI 분석</span>

    <div class="toss-card">
      <div class="card-section-label">📋 상품 개요</div>
      <div class="card-body-text">${r.overview}</div>
    </div>
    <div class="toss-card">
      <div class="card-section-label">🏭 생산 구조</div>
      <div class="card-body-text">${r.production}</div>
    </div>
    <div class="toss-card">

      <div class="card-section-label">💡 기회 포인트</div>

        <div class="opp-dot"></div><div class="opp-text">${o}</div>
      </div>`).join('')}
    </div>

    <div class="section-label mt-24">내 생각을 먼저 적어보세요</div>
    <div class="toss-card">
      <div class="my-idea-hint">AI가 분석을 제공했습니다. 이 상품에서 어떤 기회가 보이나요?</div>
      <textarea id="myIdeaInput" class="toss-textarea sm" placeholder="나만의 아이디어를 자유롭게 써보세요..."></textarea>
      <button class="toss-btn secondary full-width mt-12" onclick="expandMyIdea()">AI로 아이디어 확장하기</button>
    </div>
    <div id="myIdeaExpanded"></div>

    <div class="section-label mt-24">AI 제안 아이디어</div>
    ${r.ideas?.map((idea,i) => `
      <div class="toss-card idea-card-item">
        <div class="idea-num-row">
          <div class="idea-num">${i+1}</div>

window.runEval = async function() {
  const div = document.getElementById('evalResult');
  div.innerHTML = `<div class="toss-card loading-simple center-text mt-16">🤖 실현가능성 평가 중...</div>`;
  try {
    const profileCtx = userProfile
      ? `사용자 프로필: 역량(${userProfile.skills}), 자본(${userProfile.capital}), 관심산업(${userProfile.industry}), 가용시간(${userProfile.time})`
      : '사용자 프로필 없음 - 일반 기준으로 평가';

    const res = await fetch("https://api.anthropic.com/v1/messages", {
      method:"POST",
      headers:{"Content-Type":"application/json"},
      body: JSON.stringify({
        model:"claude-sonnet-4-6", max_tokens:1500,
        system:`비즈니스 아이디어 실현가능성 평가 전문가입니다.
${profileCtx}
JSON만 출력:
{
  "scores":{"market":{"score":0,"reason":""},"execution":{"score":0,"reason":""},"capital":{"score":0,"reason":""},"competition":{"score":0,"reason":""},"fit":{"score":0,"reason":""}},
  "total":0,"grade":"S|A|B|C",
  "summary":"종합 평가 2문장",
  "strengthPoint":"가장 강한 점",
  "weakPoint":"가장 약한 점",
  "nextAction":"당장 해볼 수 있는 첫 번째 액션 구체적으로"
}`,
        messages:[{role:"user",content:`상품: ${currentAnalysis.productName}\n개요: ${currentAnalysis.overview}\n기회: ${(currentAnalysis.opportunities||[]).join(', ')}\n아이디어: ${(currentAnalysis.ideas||[]).map(i=>i.title).join(', ')}`}]
      })
    });
    const data = await res.json();
    let text = (data.content||[]).map(i=>i.text||'').join('').replace(/```json|```/g,'').trim();
    const ev = JSON.parse(text);

    const gradeColors = {S:'#00C896',A:'#4CAF50',B:'#FFC107',C:'#FF5722'};
    const gc = gradeColors[ev.grade] || '#00C896';
    const labels = {market:'시장성',execution:'실행 난이도',capital:'초기 자본',competition:'경쟁 강도',fit:'나의 적합도'};

    div.innerHTML = `
      <div class="grade-hero" style="border-color:${gc}20;background:${gc}08">
        <div class="grade-letter" style="color:${gc}">${ev.grade}</div>
        <div class="grade-score" style="color:${gc}">${ev.total}점</div>
        <div class="grade-max">/ 100점</div>
        <div class="grade-summary">${ev.summary}</div>
      </div>

      <canvas id="radarCanvas" style="max-width:280px;width:100%;margin:0 auto;display:block"></canvas>

      <div class="section-label mt-24">항목별 점수</div>
      ${Object.entries(ev.scores).map(([k,v]) => `
        <div class="toss-card score-card">
          <div class="score-row">
            <span class="score-label">${labels[k]}</span>
            <span class="score-num" style="color:${gc}">${v.score}<span class="score-denom">/20</span></span>
          </div>
          <div class="score-bar-bg">
            <div class="score-bar-fill" style="width:${v.score/20*100}%;background:${gc}"></div>
          </div>
          <div class="score-reason">${v.reason}</div>
        </div>
      `).join('')}

      <div class="section-label mt-24">종합 인사이트</div>
      <div class="toss-card">
        <div class="insight-row green"><span class="insight-icon">✅</span><span>${ev.strengthPoint}</span></div>
        <div class="insight-divider"></div>
        <div class="insight-row yellow"><span class="insight-icon">⚠️</span><span>${ev.weakPoint}</span></div>
        <div class="insight-divider"></div>
        <div class="insight-row blue"><span class="insight-icon">🚀</span><span>${ev.nextAction}</span></div>
      </div>

      <div class="action-row mt-16">
        <button class="toss-btn primary half" onclick="genDraft()">사업 초안 생성</button>
        <button class="toss-btn secondary half" onclick="renderPage('cases')">유사 사례 탐구</button>
      </div>
      <div id="draftResult"></div>
    `;

    setTimeout(() => {
      const ctx = document.getElementById('radarCanvas')?.getContext('2d');
      if (ctx) {
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
          type:'radar',
          data:{
            labels:['시장성','실행','자본','경쟁','적합도'],
            datasets:[{
              data: Object.values(ev.scores).map(s=>s.score),
              backgroundColor: gc + '22',
              borderColor: gc,
              pointBackgroundColor: gc,
              pointRadius: 4,
              borderWidth: 2
            }]
          },
          options:{
            scales:{r:{min:0,max:20,stepSize:5,
              ticks:{color:'#999',font:{size:10},backdropColor:'transparent'},
              grid:{color:'#E8E8E8'},
              pointLabels:{color:'#333',font:{size:12,weight:'600'}}
            }},
            plugins:{legend:{display:false}},
            elements:{line:{tension:0.2}}
          }
        });
      }
    }, 100);

    if (currentUser && currentAnalysis.id) {
      try {
        await addDoc(collection(db, `users/${currentUser.uid}/evaluations`), {
          analysisId: currentAnalysis.id, productName: currentAnalysis.productName,
          scores: ev.scores, total: ev.total, grade: ev.grade,
          createdAt: serverTimestamp()
        });
        await updateDoc(doc(db, `users/${currentUser.uid}/analyses`, currentAnalysis.id), {evaluated:true});
        currentAnalysis.evalResult = ev;
      } catch(e) {}
    }
  } catch(e) {
    div.innerHTML = `<div class="toss-card error-state"><div class="error-msg">평가 실패: ${e.message}</div></div>`;
  }
};

};

window.deleteAll = async function() {
  if (!confirm('모든 분석 데이터를 삭제합니다. 계속하시겠습니까?')) return;
  try {
    const s1 = await getDocs(collection(db, `users/${currentUser.uid}/analyses`));
    for (const d of s1.docs) await deleteDoc(d.ref);
    const s2 = await getDocs(collection(db, `users/${currentUser.uid}/evaluations`));
    for (const d of s2.docs) await deleteDoc(d.ref);
    showToast('모든 데이터가 삭제됐습니다');
  } catch(e) { showToast('삭제 실패', 'error'); }
};

// ─── UTILS ────────────────────────────────────────────
function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR', {month:'short', day:'numeric'});
}

function showToast(msg, type='success') {
  const t = document.createElement('div');
  t.className = `toast ${type==='error'?'toast-error':''}`;
  t.textContent = msg;
  document.body.appendChild(t);
  requestAnimationFrame(() => { t.classList.add('show'); });
  setTimeout(() => { t.classList.remove('show'); setTimeout(()=>t.remove(), 300); }, 2500);
}

.empty-state { text-align: center; padding: 60px 24px; }

/* ── TOAST ── */
.toast {
  position: fixed; bottom: 24px; left: 50%;
  transform: translateX(-50%) translateY(12px);
  background: var(--text);
  color: #fff;
  padding: 11px 20px;
  border-radius: 24px;
  font-size: 14px;

  opacity: 0;
  transition: all 0.25s;

.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
