<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MoneyLens · 돈 벌 생각</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script type="module">
import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-app.js";
import { getAuth, GoogleAuthProvider, signInWithPopup, signOut, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-auth.js";
import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, updateDoc, query, orderBy, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore.js";

const firebaseConfig = {
  apiKey: "AIzaSyBujxf8knm_dolV2cDD_nuxMI9hucXD5ys",
  authDomain: "moneylens-e8557.firebaseapp.com",
  projectId: "moneylens-e8557",
  storageBucket: "moneylens-e8557.firebasestorage.app",
  messagingSenderId: "1085597108252",
  appId: "1:1085597108252:web:a340c8ebc84e153b4037d9"
};

const app = initializeApp(firebaseConfig);
const auth = getAuth(app);
const db = getFirestore(app);
let currentUser = null;
let userProfile = null;
let currentAnalysis = null;
let currentPage = 'lens';
let radarChart = null;

// ── AUTH ──────────────────────────────────────────────
onAuthStateChanged(auth, async (user) => {
  currentUser = user;
  if (user) {
    document.getElementById('loginScreen').style.display = 'none';
    document.getElementById('app').style.display = 'flex';
    await loadUserProfile();
    renderPage('lens');
  } else {
    document.getElementById('loginScreen').style.display = 'flex';
    document.getElementById('app').style.display = 'none';
  }
});

window.googleLogin = async () => {
  try {
    const provider = new GoogleAuthProvider();
    await signInWithPopup(auth, provider);
  } catch(e) { showToast('로그인 실패: ' + e.message, 'error'); }
};

window.logout = async () => {
  await signOut(auth);
};

// ── PROFILE ──────────────────────────────────────────
async function loadUserProfile() {
  try {
    const snap = await getDocs(query(collection(db, `users/${currentUser.uid}/profile`)));
    if (!snap.empty) {
      userProfile = snap.docs[0].data();
    } else {
      userProfile = null;
    }
  } catch(e) { userProfile = null; }
}

async function saveProfile(data) {
  try {
    const snap = await getDocs(collection(db, `users/${currentUser.uid}/profile`));
    if (!snap.empty) {
      await updateDoc(doc(db, `users/${currentUser.uid}/profile`, snap.docs[0].id), data);
    } else {
      await addDoc(collection(db, `users/${currentUser.uid}/profile`), data);
    }
    userProfile = data;
    showToast('프로필이 저장되었습니다', 'success');
  } catch(e) { showToast('저장 실패', 'error'); }
}

// ── NAVIGATION ────────────────────────────────────────
window.renderPage = function(page) {
  currentPage = page;
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  document.querySelector(`[data-tab="${page}"]`)?.classList.add('active');
  const main = document.getElementById('mainContent');

  if (page === 'lens') renderLens(main);
  else if (page === 'ideas') renderIdeas(main);
  else if (page === 'eval') renderEval(main);
  else if (page === 'cases') renderCases(main);
  else if (page === 'settings') renderSettings(main);
};

// ── LENS PAGE ─────────────────────────────────────────
function renderLens(main) {
  main.innerHTML = `
    <div class="page-header">
      <div class="logo-mark">🔍</div>
      <h1 class="page-title">돈 벌 생각</h1>
      <p class="page-sub">상품을 보는 눈이 달라지면 돈이 보인다</p>
    </div>

    <div class="input-section">
      <div class="input-tabs">
        <button class="input-tab active" onclick="switchInputTab('text',this)">텍스트</button>
        <button class="input-tab" onclick="switchInputTab('image',this)">이미지</button>
        <button class="input-tab" onclick="switchInputTab('url',this)">URL</button>
      </div>

      <div id="inputText" class="input-panel active">
        <textarea id="textInput" class="main-input" placeholder="상품명이나 서비스를 입력하세요&#10;예) 편의점 삼각김밥, 스타벅스 아메리카노, 배달앱..."></textarea>
      </div>
      <div id="inputImage" class="input-panel" style="display:none">
        <div class="image-drop" onclick="document.getElementById('imgFile').click()">
          <div id="imgPreview" class="img-preview-wrap">
            <span class="drop-icon">📷</span>
            <p>사진을 탭하여 업로드</p>
          </div>
        </div>
        <input type="file" id="imgFile" accept="image/*" style="display:none" onchange="previewImage(this)">
      </div>
      <div id="inputUrl" class="input-panel" style="display:none">
        <input type="text" id="urlInput" class="main-input url-input" placeholder="쿠팡, 네이버 쇼핑 등 URL 붙여넣기">
      </div>

      <button class="analyze-btn" onclick="startAnalysis()">
        <span class="btn-icon">🔬</span> 분석 시작
      </button>
    </div>

    <div id="analysisResult" style="display:none"></div>
  `;
}

window.switchInputTab = function(type, btn) {
  document.querySelectorAll('.input-tab').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  document.querySelectorAll('.input-panel').forEach(p => p.style.display = 'none');
  document.getElementById('input' + type.charAt(0).toUpperCase() + type.slice(1)).style.display = 'block';
};

window.previewImage = function(input) {
  const file = input.files[0];
  if (!file) return;
  const reader = new FileReader();
  reader.onload = e => {
    document.getElementById('imgPreview').innerHTML = `<img src="${e.target.result}" style="max-width:100%;max-height:200px;border-radius:8px;">`;
  };
  reader.readAsDataURL(file);
};

window.startAnalysis = async function() {
  const activeTab = document.querySelector('.input-tab.active')?.textContent;
  let inputContent = '';
  let inputType = 'text';
  let imageBase64 = null;

  if (activeTab === '텍스트') {
    inputContent = document.getElementById('textInput')?.value?.trim();
    inputType = 'text';
  } else if (activeTab === '이미지') {
    const file = document.getElementById('imgFile')?.files[0];
    if (!file) { showToast('이미지를 선택해주세요', 'error'); return; }
    inputContent = file.name;
    inputType = 'image';
    imageBase64 = await fileToBase64(file);
  } else if (activeTab === 'URL') {
    inputContent = document.getElementById('urlInput')?.value?.trim();
    inputType = 'url';
  }

  if (!inputContent) { showToast('분석할 내용을 입력해주세요', 'error'); return; }
  if (!currentUser) { showToast('로그인이 필요합니다', 'error'); return; }

  const resultDiv = document.getElementById('analysisResult');
  resultDiv.style.display = 'block';
  resultDiv.innerHTML = `<div class="analysis-loading">
    <div class="loading-steps">
      <div class="loading-step" id="ls1">⏳ 상품 개요 파악 중...</div>
      <div class="loading-step" id="ls2">⏳ 생산 구조 분석 중...</div>
      <div class="loading-step" id="ls3">⏳ 유통 경로 추적 중...</div>
      <div class="loading-step" id="ls4">⏳ 시장 규모 추정 중...</div>
      <div class="loading-step" id="ls5">⏳ 기회 포인트 탐색 중...</div>
      <div class="loading-step" id="ls6">⏳ 아이디어 생성 중...</div>
    </div>
  </div>`;

  const steps = [1,2,3,4,5,6];
  steps.forEach((s, i) => {
    setTimeout(() => {
      const el = document.getElementById(`ls${s}`);
      if (el) el.innerHTML = el.innerHTML.replace('⏳','✅').replace(' 중...', ' 완료');
    }, i * 800);
  });

  try {
    const profileContext = userProfile ? `
사용자 프로필:
- 보유 역량: ${userProfile.skills || '미입력'}
- 가용 자본: ${userProfile.capital || '미입력'}
- 관심 산업: ${userProfile.industry || '미입력'}
- 가용 시간: ${userProfile.time || '미입력'}
위 프로필을 기반으로 "나의 적합도" 분석 시 개인화된 평가를 해주세요.` : '';

    const messages = imageBase64
      ? [{ role: "user", content: [
          { type: "image", source: { type: "base64", media_type: "image/jpeg", data: imageBase64 }},
          { type: "text", text: `이 상품 이미지를 분석해주세요.${profileContext}` }
        ]}]
      : [{ role: "user", content: `분석 대상: ${inputType === 'url' ? 'URL: ' : ''}${inputContent}\n\n${profileContext}` }];

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 2000,
        system: `당신은 비즈니스 역공학(reverse engineering) 전문가입니다.
사용자가 입력한 상품/서비스를 분석하여 돈이 되는 기회를 발견하도록 도와줍니다.
모든 분석은 한국어로, 구체적 수치와 함께 제공하세요.
추정값은 반드시 신뢰도를 표기하세요: ✅확인됨 / ⚠️추정 / ❓불확실
응답은 반드시 JSON만 출력하세요. 마크다운 코드블록 없이 순수 JSON만.

{
  "productName": "상품명",
  "overview": "상품 개요 (무엇인가, 왜 만들어졌나) - 2~3문장",
  "production": "생산 구조 및 원가 추정 (신뢰도 표기 포함)",
  "distribution": "유통 경로 및 마진 구조 (각 단계 % 추정)",
  "market": "시장 규모 추정 (국내/글로벌)",
  "opportunities": ["기회1", "기회2", "기회3"],
  "ideas": [
    {"title": "아이디어 제목", "description": "구체적 설명 2~3문장", "revenueModel": "수익 모델"}
  ],
  "reliabilityNote": "분석 신뢰도 전반 코멘트"
}`,
        messages
      })
    });

    const data = await response.json();
    let text = data.content?.map(i => i.text || '').join('') || '';
    text = text.replace(/```json|```/g, '').trim();
    const result = JSON.parse(text);
    currentAnalysis = { ...result, inputContent, inputType, timestamp: new Date().toISOString() };
    renderAnalysisResult(resultDiv, result, inputContent);
  } catch(e) {
    resultDiv.innerHTML = `<div class="error-card">❌ 분석 중 오류가 발생했습니다.<br><small>${e.message}</small></div>`;
  }
};

function renderAnalysisResult(container, r, productName) {
  container.innerHTML = `
    <div class="result-header">
      <h2 class="result-product">${r.productName || productName}</h2>
      <div class="reliability-badge">⚠️ AI 추정 분석 · 수치 검증 필요</div>
    </div>

    <div class="result-cards">
      <div class="result-card">
        <div class="card-label">📋 상품 개요</div>
        <div class="card-body">${r.overview}</div>
      </div>
      <div class="result-card">
        <div class="card-label">🏭 생산 구조</div>
        <div class="card-body">${r.production}</div>
      </div>
      <div class="result-card">
        <div class="card-label">🚚 유통 경로</div>
        <div class="card-body">${r.distribution}</div>
      </div>
      <div class="result-card">
        <div class="card-label">📊 시장 규모</div>
        <div class="card-body">${r.market}</div>
      </div>
      <div class="result-card">
        <div class="card-label">💡 기회 포인트</div>
        <div class="card-body">
          ${r.opportunities?.map(o => `<div class="opp-item">▸ ${o}</div>`).join('') || ''}
        </div>
      </div>
    </div>

    <div class="ideas-section">
      <h3 class="section-title">💰 돈 되는 아이디어</h3>
      <div class="my-idea-box">
        <p class="my-idea-label">✏️ 내 생각을 먼저 적어보세요</p>
        <textarea id="myIdeaInput" class="my-idea-input" placeholder="이 상품을 보고 떠오른 나만의 아이디어를 자유롭게 써보세요..."></textarea>
        <button class="expand-btn" onclick="expandMyIdea()">AI로 확장하기 →</button>
      </div>
      <div id="myIdeaExpanded"></div>
      <div class="ai-ideas">
        <p class="ai-ideas-label">🤖 AI 제안 아이디어</p>
        ${r.ideas?.map((idea, i) => `
          <div class="idea-card">
            <div class="idea-num">${i+1}</div>
            <div class="idea-content">
              <div class="idea-title">${idea.title}</div>
              <div class="idea-desc">${idea.description}</div>
              <div class="idea-revenue">💰 ${idea.revenueModel}</div>
            </div>
          </div>
        `).join('') || ''}
      </div>
    </div>

    <div class="reliability-note">
      <span class="rn-icon">ℹ️</span>
      <span>${r.reliabilityNote || '모든 수치는 AI 추정값입니다. 중요한 의사결정 전 반드시 직접 검증하세요.'}</span>
    </div>

    <div class="action-btns">
      <button class="action-btn primary" onclick="saveAnalysis()">📁 아이디어함에 저장</button>
      <button class="action-btn secondary" onclick="goToEval()">📊 실현가능성 평가</button>
    </div>
  `;
}

window.expandMyIdea = async function() {
  const myIdea = document.getElementById('myIdeaInput')?.value?.trim();
  if (!myIdea) { showToast('아이디어를 먼저 입력해주세요', 'error'); return; }

  const expandDiv = document.getElementById('myIdeaExpanded');
  expandDiv.innerHTML = `<div class="loading-inline">🤖 아이디어 확장 중...</div>`;

  try {
    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1000,
        system: `사용자의 비즈니스 아이디어를 구체화하고 확장해주는 전문가입니다.
응답은 JSON만 출력하세요:
{"expanded": "확장된 아이디어 설명 3~4문장", "revenueModel": "수익 모델", "firstStep": "첫 번째 실행 단계"}`,
        messages: [{ role: "user", content: `상품: ${currentAnalysis?.productName}\n내 아이디어: ${myIdea}\n\n이 아이디어를 구체적으로 확장해주세요.` }]
      })
    });
    const data = await response.json();
    let text = data.content?.map(i => i.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const r = JSON.parse(text);
    expandDiv.innerHTML = `
      <div class="expanded-idea-card">
        <div class="card-label">✨ AI가 확장한 내 아이디어</div>
        <div class="card-body">${r.expanded}</div>
        <div class="idea-revenue">💰 ${r.revenueModel}</div>
        <div class="first-step">🚀 첫 단계: ${r.firstStep}</div>
      </div>`;
    if (currentAnalysis) currentAnalysis.myIdea = myIdea;
  } catch(e) {
    expandDiv.innerHTML = `<div class="error-card">확장 실패: ${e.message}</div>`;
  }
};

window.saveAnalysis = async function() {
  if (!currentAnalysis) { showToast('분석 결과가 없습니다', 'error'); return; }
  if (!currentUser) { showToast('로그인이 필요합니다', 'error'); return; }
  try {
    await addDoc(collection(db, `users/${currentUser.uid}/analyses`), {
      ...currentAnalysis,
      savedAt: serverTimestamp(),
      evaluated: false
    });
    showToast('아이디어함에 저장되었습니다 ✅', 'success');
  } catch(e) { showToast('저장 실패: ' + e.message, 'error'); }
};

window.goToEval = function() {
  if (!currentAnalysis) { showToast('분석 결과가 없습니다', 'error'); return; }
  renderPage('eval');
};

// ── IDEAS PAGE ────────────────────────────────────────
async function renderIdeas(main) {
  main.innerHTML = `<div class="page-header"><h1 class="page-title">💡 아이디어함</h1><p class="page-sub">저장된 분석과 아이디어 목록</p></div><div class="loading-inline">불러오는 중...</div>`;

  try {
    const snap = await getDocs(query(collection(db, `users/${currentUser.uid}/analyses`), orderBy('savedAt', 'desc')));
    const analyses = snap.docs.map(d => ({ id: d.id, ...d.data() }));

    const totalCount = analyses.length;
    const evalCount = analyses.filter(a => a.evaluated).length;
    const industries = {};
    analyses.forEach(a => {
      const key = a.productName?.split(' ')[0] || '기타';
      industries[key] = (industries[key] || 0) + 1;
    });
    const topIndustry = Object.entries(industries).sort((a,b) => b[1]-a[1]).slice(0,3).map(e=>e[0]).join(', ');

    main.innerHTML = `
      <div class="page-header">
        <h1 class="page-title">💡 아이디어함</h1>
        <p class="page-sub">저장된 분석과 아이디어 목록</p>
      </div>
      <div class="dashboard-row">
        <div class="dash-card"><div class="dash-num">${totalCount}</div><div class="dash-label">총 분석</div></div>
        <div class="dash-card"><div class="dash-num">${evalCount}</div><div class="dash-label">평가 완료</div></div>
        <div class="dash-card"><div class="dash-num">${topIndustry || '-'}</div><div class="dash-label">관심 분야</div></div>
      </div>
      ${analyses.length === 0
        ? `<div class="empty-state"><div class="empty-icon">🔍</div><p>아직 저장된 분석이 없습니다<br>렌즈 탭에서 상품을 분석해보세요</p></div>`
        : analyses.map(a => `
          <div class="idea-list-card" onclick="toggleIdeaDetail('${a.id}')">
            <div class="idea-list-header">
              <div class="idea-list-name">${a.productName || a.inputContent}</div>
              <div class="idea-list-meta">
                ${a.evaluated ? '<span class="badge-eval">평가완료</span>' : ''}
                <span class="idea-date">${formatDate(a.savedAt)}</span>
              </div>
            </div>
            <div class="idea-list-preview">${a.opportunities?.[0] || ''}</div>
            <div id="detail-${a.id}" class="idea-detail" style="display:none">
              <div class="detail-section"><b>📋 개요</b><p>${a.overview || ''}</p></div>
              <div class="detail-section"><b>🏭 생산구조</b><p>${a.production || ''}</p></div>
              <div class="detail-section"><b>🚚 유통경로</b><p>${a.distribution || ''}</p></div>
              <div class="detail-section"><b>📊 시장규모</b><p>${a.market || ''}</p></div>
              ${a.myIdea ? `<div class="detail-section"><b>✏️ 내 아이디어</b><p>${a.myIdea}</p></div>` : ''}
              <div class="detail-actions">
                <button class="action-btn secondary small" onclick="event.stopPropagation();loadAndEval('${a.id}')">📊 평가하기</button>
                <button class="action-btn danger small" onclick="event.stopPropagation();deleteAnalysis('${a.id}')">🗑️ 삭제</button>
              </div>
            </div>
          </div>
        `).join('')}
    `;
  } catch(e) {
    main.innerHTML = `<div class="error-card">불러오기 실패: ${e.message}</div>`;
  }
}

window.toggleIdeaDetail = function(id) {
  const el = document.getElementById(`detail-${id}`);
  if (el) el.style.display = el.style.display === 'none' ? 'block' : 'none';
};

window.deleteAnalysis = async function(id) {
  if (!confirm('삭제하시겠습니까?')) return;
  try {
    await deleteDoc(doc(db, `users/${currentUser.uid}/analyses`, id));
    showToast('삭제되었습니다', 'success');
    renderPage('ideas');
  } catch(e) { showToast('삭제 실패', 'error'); }
};

window.loadAndEval = async function(id) {
  const snap = await getDocs(collection(db, `users/${currentUser.uid}/analyses`));
  const found = snap.docs.find(d => d.id === id);
  if (found) {
    currentAnalysis = { id: found.id, ...found.data() };
    renderPage('eval');
  }
};

// ── EVAL PAGE ─────────────────────────────────────────
function renderEval(main) {
  if (!currentAnalysis) {
    main.innerHTML = `
      <div class="page-header"><h1 class="page-title">📊 평가실</h1></div>
      <div class="empty-state">
        <div class="empty-icon">📊</div>

window.runEvaluation = async function() {
  const evalDiv = document.getElementById('evalResult');
  evalDiv.innerHTML = `<div class="loading-inline">🤖 실현가능성 평가 중...</div>`;

  try {
    const profileCtx = userProfile
      ? `사용자 프로필: 역량(${userProfile.skills}), 자본(${userProfile.capital}), 관심산업(${userProfile.industry}), 가용시간(${userProfile.time})`
      : '사용자 프로필 없음 - 일반적 기준으로 평가';

    const response = await fetch("https://api.anthropic.com/v1/messages", {
      method: "POST",
      headers: { "Content-Type": "application/json" },
      body: JSON.stringify({
        model: "claude-sonnet-4-6",
        max_tokens: 1500,
        system: `비즈니스 아이디어 실현가능성 평가 전문가입니다.
5가지 항목을 각 0~20점으로 평가하고 근거를 제시하세요.
${profileCtx}
JSON만 출력하세요:
{
  "scores": {
    "market": {"score": 0, "reason": ""},
    "execution": {"score": 0, "reason": ""},
    "capital": {"score": 0, "reason": ""},
    "competition": {"score": 0, "reason": ""},
    "fit": {"score": 0, "reason": ""}
  },
  "total": 0,
  "grade": "S/A/B/C",
  "summary": "종합 평가 2~3문장",
  "strengthPoint": "가장 강한 점",
  "weakPoint": "가장 약한 점",
  "nextAction": "당장 해볼 수 있는 첫 번째 액션"
}`,
        messages: [{ role: "user", content: `상품: ${currentAnalysis.productName}\n개요: ${currentAnalysis.overview}\n기회: ${currentAnalysis.opportunities?.join(', ')}\n아이디어: ${currentAnalysis.ideas?.map(i=>i.title).join(', ')}` }]
      })
    });

    const data = await response.json();
    let text = data.content?.map(i => i.text || '').join('');
    text = text.replace(/```json|```/g, '').trim();
    const ev = JSON.parse(text);

    const gradeColor = { S: '#00C896', A: '#4CAF50', B: '#FFC107', C: '#FF5722' };
    const scoreLabels = { market: '시장성', execution: '실행난이도', capital: '자본요건', competition: '경쟁강도', fit: '나의 적합도' };

    evalDiv.innerHTML = `
      <div class="eval-grade-box" style="border-color:${gradeColor[ev.grade]}">
        <div class="grade-letter" style="color:${gradeColor[ev.grade]}">${ev.grade}</div>
        <div class="grade-total">${ev.total}점 / 100점</div>
        <div class="grade-summary">${ev.summary}</div>
      </div>

      <canvas id="radarCanvas" width="300" height="300" style="max-width:300px;margin:0 auto;display:block;"></canvas>

      <div class="score-list">
        ${Object.entries(ev.scores).map(([key, val]) => `
          <div class="score-item">
            <div class="score-header">
              <span class="score-label">${scoreLabels[key]}</span>
              <span class="score-val" style="color:${gradeColor[ev.grade]}">${val.score}/20</span>
            </div>
            <div class="score-bar"><div class="score-fill" style="width:${val.score/20*100}%;background:${gradeColor[ev.grade]}"></div></div>
            <div class="score-reason">${val.reason}</div>
          </div>
        `).join('')}
      </div>

      <div class="eval-insights">
        <div class="insight-card strength">✅ 강점: ${ev.strengthPoint}</div>
        <div class="insight-card weak">⚠️ 약점: ${ev.weakPoint}</div>
        <div class="insight-card action">🚀 첫 액션: ${ev.nextAction}</div>
      </div>

      <div class="action-btns">
        <button class="action-btn primary" onclick="generateBusinessDraft()">📄 사업 초안 생성</button>
        <button class="action-btn secondary" onclick="goToCases()">📚 유사 사례 탐구</button>
      </div>
      <div id="businessDraft"></div>
    `;

    setTimeout(() => {
      const ctx = document.getElementById('radarCanvas')?.getContext('2d');
      if (ctx) {
        if (radarChart) radarChart.destroy();
        radarChart = new Chart(ctx, {
          type: 'radar',
          data: {
            labels: ['시장성', '실행', '자본', '경쟁', '적합도'],
            datasets: [{
              data: Object.values(ev.scores).map(s => s.score),
              backgroundColor: 'rgba(0,200,150,0.2)',
              borderColor: '#00C896',
              pointBackgroundColor: '#00C896',
              borderWidth: 2
            }]
          },
          options: {
            scales: { r: { min: 0, max: 20, ticks: { color: '#888', stepSize: 5 }, grid: { color: '#333' }, pointLabels: { color: '#ccc', font: { size: 12 } } } },
            plugins: { legend: { display: false } }
          }
        });
      }
    }, 100);

    // Save evaluation
    if (currentUser && currentAnalysis.id) {
      try {
        await addDoc(collection(db, `users/${currentUser.uid}/evaluations`), {
          analysisId: currentAnalysis.id,
          productName: currentAnalysis.productName,
          scores: ev.scores,
          total: ev.total,
          grade: ev.grade,
          summary: ev.summary,
          nextAction: ev.nextAction,
          createdAt: serverTimestamp()
        });
        await updateDoc(doc(db, `users/${currentUser.uid}/analyses`, currentAnalysis.id), { evaluated: true });
        currentAnalysis.evalResult = ev;
      } catch(e) {}
    }

  } catch(e) {
    evalDiv.innerHTML = `<div class="error-card">평가 실패: ${e.message}</div>`;
  }
};

window.deleteAllData = async function() {
  if (!confirm('모든 분석 데이터를 삭제하시겠습니까? 이 작업은 되돌릴 수 없습니다.')) return;
  try {
    const snap = await getDocs(collection(db, `users/${currentUser.uid}/analyses`));
    for (const d of snap.docs) await deleteDoc(d.ref);
    const snap2 = await getDocs(collection(db, `users/${currentUser.uid}/evaluations`));
    for (const d of snap2.docs) await deleteDoc(d.ref);
    showToast('전체 데이터가 삭제되었습니다', 'success');
  } catch(e) { showToast('삭제 실패', 'error'); }
};

function fileToBase64(file) {
  return new Promise((res, rej) => {
    const r = new FileReader();
    r.onload = () => res(r.result.split(',')[1]);
    r.onerror = () => rej(new Error('파일 읽기 실패'));
    r.readAsDataURL(file);
  });
}

function formatDate(ts) {
  if (!ts) return '';
  const d = ts.toDate ? ts.toDate() : new Date(ts);
  return d.toLocaleDateString('ko-KR', { month: 'short', day: 'numeric' });
}

function showToast(msg, type = 'success') {
  const t = document.createElement('div');
  t.className = `toast toast-${type}`;
  t.textContent = msg;
  document.body.appendChild(t);
  setTimeout(() => t.classList.add('show'), 10);
  setTimeout(() => { t.classList.remove('show'); setTimeout(() => t.remove(), 300); }, 2500);
}

.score-list { margin: 16px 0; }

.case-card { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 12px; }

.settings-section { background: var(--bg2); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; margin-bottom: 12px; }

/* TOAST */
.toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%) translateY(20px);
  background: var(--bg3); border: 1px solid var(--border); color: var(--text);

}

.toast.toast-success { border-color: var(--green); color: var(--green); }
