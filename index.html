<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>MoneyLens · 돈 벌 생각</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Pretendard:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#F4F6FA;--surface:#FFFFFF;--surface2:#F8F9FC;
  --border:#ECEEF4;--border2:#DDE0EB;
  --text:#0F1117;--text2:#5A607A;--text3:#9BA3BF;
  --green:#05C072;--green2:#03A861;--green-bg:#EDFBF4;--green-mid:rgba(5,192,114,0.18);
  --indigo:#4F6EF7;--indigo-bg:#EEF1FE;
  --amber:#F59E0B;--amber-bg:#FFFBEB;
  --danger:#EF4444;--danger-bg:#FEF2F2;
  --radius:18px;--radius-sm:12px;--radius-xs:8px;
  --shadow-sm:0 1px 4px rgba(15,17,23,0.06);
  --shadow:0 4px 16px rgba(15,17,23,0.08);
}
html,body{height:100%;font-family:'Pretendard',-apple-system,BlinkMacSystemFont,sans-serif;background:var(--bg);color:var(--text);font-size:15px;-webkit-font-smoothing:antialiased;overflow:hidden}
.screen{display:none;height:100vh}
.screen.active{display:flex;flex-direction:column}

/* ONBOARDING */
#onboardingScreen{background:var(--surface);align-items:center;justify-content:space-between}
.ob-body{flex:1;display:flex;flex-direction:column;align-items:center;justify-content:center;padding:48px 32px 24px;text-align:center;width:100%}
.ob-icon-wrap{width:100px;height:100px;border-radius:28px;background:var(--green-bg);display:flex;align-items:center;justify-content:center;margin-bottom:36px;box-shadow:0 8px 32px rgba(5,192,114,0.2)}
.ob-icon-wrap svg{width:48px;height:48px;stroke:var(--green)}
.ob-title{font-size:28px;font-weight:800;line-height:1.3;letter-spacing:-0.5px;color:var(--text);margin-bottom:14px}
.ob-desc{font-size:15px;color:var(--text2);line-height:1.75;max-width:300px}
.ob-footer{width:100%;padding:0 24px 48px}
.ob-dots{display:flex;gap:6px;justify-content:center;margin-bottom:28px}
.ob-dot{height:6px;border-radius:3px;background:var(--border2);transition:all 0.35s;width:6px}
.ob-dot.active{width:22px;background:var(--green)}
#obNextBtn{width:100%;padding:16px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:16px;font-weight:700;font-family:inherit;cursor:pointer;margin-bottom:14px;transition:all 0.2s}
#obNextBtn:active{transform:scale(0.98);background:var(--green2)}
#obSkip{display:block;text-align:center;background:none;border:none;color:var(--text3);font-size:14px;font-family:inherit;cursor:pointer;padding:6px;width:100%}

/* AUTH */
#authScreen{background:var(--surface);overflow-y:auto}
.auth-wrap{padding:52px 24px 40px;width:100%;max-width:420px;margin:0 auto}
.auth-logo-wrap{display:flex;align-items:center;gap:10px;margin-bottom:8px}
.auth-logo-icon{width:40px;height:40px;border-radius:12px;background:var(--green-bg);display:flex;align-items:center;justify-content:center}
.auth-logo-icon svg{width:22px;height:22px;stroke:var(--green)}
.auth-brand{font-size:20px;font-weight:800;color:var(--green);letter-spacing:-0.3px}
.auth-heading{font-size:26px;font-weight:800;color:var(--text);letter-spacing:-0.5px;margin-bottom:6px;margin-top:28px}
.auth-sub{font-size:14px;color:var(--text2);margin-bottom:32px}
.form-group{margin-bottom:16px}
.form-label{display:block;font-size:13px;font-weight:600;color:var(--text2);margin-bottom:7px}
.ml-input{width:100%;padding:14px 16px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:all 0.2s;-webkit-appearance:none}
.ml-input:focus{border-color:var(--green);background:#fff}
.ml-input::placeholder{color:var(--text3)}
.auth-error{display:none;background:var(--danger-bg);border:1px solid #FECACA;border-radius:var(--radius-xs);color:var(--danger);font-size:13px;font-weight:500;padding:10px 14px;margin-bottom:16px;line-height:1.5}
.btn-primary{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;transition:all 0.2s;margin-bottom:12px}
.btn-primary:active{transform:scale(0.98);background:var(--green2)}
.btn-ghost{width:100%;padding:14px;background:none;border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text2);font-size:14px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s}
.btn-ghost:hover{border-color:var(--green);color:var(--green)}
.back-link{display:flex;align-items:center;gap:6px;color:var(--text2);font-size:14px;font-weight:600;background:none;border:none;font-family:inherit;cursor:pointer;padding:0;margin-bottom:28px}
.back-link svg{width:16px;height:16px;stroke:var(--text2)}

/* APP */
#appScreen{background:var(--bg);overflow:hidden}
.top-nav{background:var(--surface);border-bottom:1px solid var(--border);padding:0 16px;flex-shrink:0;box-shadow:var(--shadow-sm)}
.nav-brand-row{display:flex;align-items:center;gap:8px;padding:12px 0 8px}
.nav-brand-icon{width:28px;height:28px;border-radius:8px;background:var(--green-bg);display:flex;align-items:center;justify-content:center}
.nav-brand-icon svg{width:16px;height:16px;stroke:var(--green)}
.nav-brand-name{font-size:16px;font-weight:800;color:var(--text);letter-spacing:-0.3px}
.nav-brand-sub{font-size:12px;color:var(--text3);margin-left:2px}
.top-tabs{display:flex;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none;gap:2px}
.top-tabs::-webkit-scrollbar{display:none}
.top-tab{flex-shrink:0;padding:10px 14px;background:none;border:none;border-bottom:2.5px solid transparent;color:var(--text3);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;white-space:nowrap;display:flex;align-items:center;gap:5px}
.top-tab svg{width:14px;height:14px;stroke:currentColor}
.top-tab.active{color:var(--green);border-bottom-color:var(--green)}
#mainContent{flex:1;overflow-y:auto;-webkit-overflow-scrolling:touch;padding:20px 16px 36px}

/* PAGE */
.page-hero{margin-bottom:22px}
.hero-badge{display:inline-flex;align-items:center;gap:5px;font-size:11px;font-weight:700;color:var(--green);background:var(--green-bg);border-radius:20px;padding:4px 10px;margin-bottom:8px;letter-spacing:0.3px}
.hero-badge svg{width:11px;height:11px;stroke:var(--green)}
.hero-title{font-size:26px;font-weight:800;color:var(--text);line-height:1.25;letter-spacing:-0.6px}

/* CARDS */
.ml-card{background:var(--surface);border-radius:var(--radius);padding:18px 16px;margin-bottom:12px;box-shadow:var(--shadow-sm);border:1px solid var(--border)}
.ml-card.accent{border-color:var(--green);border-width:1.5px}
.card-eyebrow{display:flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase;letter-spacing:0.6px;margin-bottom:8px}
.card-eyebrow svg{width:12px;height:12px;stroke:var(--green)}
.card-body{font-size:14px;color:var(--text2);line-height:1.7}

/* MODE TABS */
.mode-tabs{display:flex;gap:6px;margin-bottom:14px}
.mode-tab{flex:1;padding:10px 8px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-xs);color:var(--text2);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.2s;display:flex;align-items:center;justify-content:center;gap:5px}
.mode-tab svg{width:13px;height:13px;stroke:currentColor}
.mode-tab.active{background:var(--green-bg);border-color:var(--green);color:var(--green)}

/* INPUTS */
.ml-textarea{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;resize:none;min-height:108px;line-height:1.65;outline:none;transition:all 0.2s;-webkit-appearance:none}
.ml-textarea:focus{border-color:var(--green);background:#fff}
.ml-textarea::placeholder{color:var(--text3)}
.ml-textarea.sm{min-height:80px}
.ml-input-field{width:100%;padding:13px 14px;background:var(--surface2);border:1.5px solid var(--border2);border-radius:var(--radius-sm);color:var(--text);font-family:inherit;font-size:15px;outline:none;transition:all 0.2s;-webkit-appearance:none}
.ml-input-field:focus{border-color:var(--green);background:#fff}
.ml-input-field::placeholder{color:var(--text3)}
select.ml-input-field{cursor:pointer}

/* IMAGE UPLOAD */
.img-drop{border:2px dashed var(--border2);border-radius:var(--radius-sm);padding:32px 16px;text-align:center;cursor:pointer;background:var(--surface2);transition:all 0.2s}
.img-drop:hover{border-color:var(--green);background:var(--green-bg)}
.img-drop svg{width:32px;height:32px;stroke:var(--text3);display:block;margin:0 auto 8px}
.img-drop-text{font-size:14px;font-weight:600;color:var(--text2)}
.img-drop-sub{font-size:12px;color:var(--text3);margin-top:4px}

/* BUTTONS */
.btn-full{width:100%;padding:15px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);font-size:15px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:14px;display:flex;align-items:center;justify-content:center;gap:8px;transition:all 0.2s;letter-spacing:-0.2px}
.btn-full svg{width:16px;height:16px;stroke:currentColor}
.btn-full:active{transform:scale(0.98);background:var(--green2)}
.btn-full.secondary{background:var(--green-bg);color:var(--green);border:1.5px solid var(--green-mid)}
.btn-full.secondary:active{background:#d4f5e7}
.btn-full.outline{background:none;color:var(--text2);border:1.5px solid var(--border2)}
.btn-full.danger-btn{background:var(--danger-bg);color:var(--danger);border:1px solid #FECACA}
.btn-row{display:flex;gap:8px;margin-top:14px}
.btn-row .btn-full{margin-top:0}
.btn-sm{padding:9px 14px;border-radius:var(--radius-xs);font-size:13px;font-weight:600;font-family:inherit;cursor:pointer;transition:all 0.15s;display:flex;align-items:center;gap:5px;border:none}
.btn-sm svg{width:13px;height:13px;stroke:currentColor}
.btn-sm.green{background:var(--green-bg);color:var(--green)}
.btn-sm.red{background:var(--danger-bg);color:var(--danger)}

/* AI GUIDE */
.ai-guide-box{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-top:12px}
.ai-guide-title{display:flex;align-items:center;gap:6px;font-size:12px;font-weight:700;color:var(--text2);margin-bottom:10px}
.ai-guide-title svg{width:13px;height:13px;stroke:var(--text2)}
.ai-guide-steps{display:flex;flex-direction:column;gap:7px;margin-bottom:12px}
.ai-guide-step{display:flex;align-items:center;gap:8px;font-size:13px;color:var(--text2)}
.step-num{width:20px;height:20px;border-radius:50%;background:var(--green);color:#fff;font-size:11px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.ai-guide-links{display:flex;gap:8px;flex-wrap:wrap}
.ai-link{display:inline-block;font-size:12px;font-weight:700;color:var(--indigo);background:var(--indigo-bg);border-radius:20px;padding:5px 12px;text-decoration:none;transition:opacity 0.2s}
.ai-link:active{opacity:0.7}
.ai-photo-note{font-size:12px;color:var(--text3);margin-top:10px;padding-top:10px;border-top:1px solid var(--border);line-height:1.5}
.paste-hint{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}

/* SECTION LABEL */
.section-label{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;letter-spacing:0.8px;margin-bottom:10px;display:flex;align-items:center;gap:5px}
.section-label svg{width:11px;height:11px;stroke:var(--text3)}

/* HINTS */
.hint-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px;margin-bottom:14px}
.hint-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:12px;display:flex;align-items:center;gap:8px;cursor:pointer;box-shadow:var(--shadow-sm);transition:all 0.15s}
.hint-card:active{transform:scale(0.97);border-color:var(--green)}
.hint-emoji{font-size:18px}
.hint-text{font-size:12px;font-weight:600;color:var(--text2);line-height:1.3}

/* LOADING */
.spinner{width:20px;height:20px;border:2.5px solid var(--green-bg);border-top-color:var(--green);border-radius:50%;animation:spin 0.7s linear infinite;flex-shrink:0}
@keyframes spin{to{transform:rotate(360deg)}}
.loading-inline{text-align:center;padding:28px 16px;font-size:14px;color:var(--text2);display:flex;align-items:center;justify-content:center;gap:8px}

/* RESULT */
.result-title-bar{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px}
.result-product-name{font-size:20px;font-weight:800;letter-spacing:-0.4px}
.result-tag{font-size:11px;font-weight:700;background:var(--green-bg);color:var(--green);border-radius:20px;padding:4px 10px}
.opp-row{display:flex;align-items:flex-start;gap:8px;margin-bottom:9px}
.opp-bullet{width:7px;height:7px;border-radius:50%;background:var(--green);flex-shrink:0;margin-top:5px}
.opp-text{font-size:14px;color:var(--text);line-height:1.55}
.idea-item{display:flex;gap:12px;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px;margin-bottom:10px;box-shadow:var(--shadow-sm);border-left:3px solid var(--green-mid)}
.idea-idx{width:26px;height:26px;border-radius:50%;background:var(--green-bg);color:var(--green);font-size:12px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.idea-body{flex:1}
.idea-title{font-size:14px;font-weight:700;margin-bottom:5px}
.idea-desc{font-size:13px;color:var(--text2);line-height:1.6;margin-bottom:7px}
.revenue-tag{display:inline-flex;align-items:center;gap:4px;font-size:12px;font-weight:600;color:var(--green2);background:var(--green-bg);border-radius:6px;padding:3px 9px}
.revenue-tag svg{width:11px;height:11px;stroke:var(--green2)}
.reliability-strip{background:var(--amber-bg);border:1px solid #FDE68A;border-radius:var(--radius-xs);padding:10px 14px;font-size:12px;color:#92400E;margin:12px 0;display:flex;align-items:flex-start;gap:6px;line-height:1.5}
.reliability-strip svg{width:13px;height:13px;stroke:var(--amber);flex-shrink:0;margin-top:1px}
.my-idea-label{font-size:13px;color:var(--text2);margin-bottom:10px;line-height:1.5}

/* STATS */
.stat-row{display:flex;gap:8px;margin-bottom:16px}
.stat-box{flex:1;background:var(--surface);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 10px;text-align:center;box-shadow:var(--shadow-sm)}
.stat-num{font-size:22px;font-weight:800;color:var(--green);letter-spacing:-0.5px}
.stat-num.sm{font-size:12px;font-weight:700;padding-top:5px;line-height:1.4}
.stat-label{font-size:11px;color:var(--text3);margin-top:3px}

/* IDEA LIST */
.idea-list-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:10px;box-shadow:var(--shadow-sm);cursor:pointer;transition:border-color 0.2s}
.idea-list-card:active{border-color:var(--green)}
.ilc-main{display:flex;align-items:flex-start;justify-content:space-between;gap:10px}
.ilc-name{font-size:15px;font-weight:700;margin-bottom:4px}
.ilc-preview{font-size:13px;color:var(--text3);line-height:1.4}
.ilc-right{display:flex;flex-direction:column;align-items:flex-end;gap:5px;flex-shrink:0}
.pill{font-size:11px;font-weight:700;border-radius:20px;padding:3px 9px}
.pill.green{background:var(--green-bg);color:var(--green)}
.pill.gray{background:var(--bg);color:var(--text3);border:1px solid var(--border2)}
.pill.red{background:var(--danger-bg);color:var(--danger)}
.date-text{font-size:11px;color:var(--text3)}
.chevron-icon svg{width:16px;height:16px;stroke:var(--text3)}
.detail-panel{display:none}
.detail-divider{height:1px;background:var(--border);margin:14px 0}
.detail-row{margin-bottom:10px}
.detail-key{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;margin-bottom:3px}
.detail-val{font-size:13px;color:var(--text2);line-height:1.55}
.detail-val.hl{color:var(--text);font-weight:600}
.detail-actions{display:flex;gap:8px;margin-top:14px}

/* EVAL */
.selected-bar{background:var(--green-bg);border:1.5px solid var(--green-mid);border-radius:var(--radius-sm);padding:12px 14px;margin-bottom:12px;display:flex;align-items:center;gap:10px}
.selected-bar svg{width:16px;height:16px;stroke:var(--green);flex-shrink:0}
.selected-bar-inner{flex:1}
.selected-label{font-size:11px;font-weight:700;color:var(--green);text-transform:uppercase}
.selected-name{font-size:14px;font-weight:700;color:var(--text);margin-top:2px}
.notice-card{display:flex;gap:12px;align-items:flex-start;background:var(--amber-bg);border:1px solid #FDE68A;border-radius:var(--radius-sm);padding:14px;margin-bottom:12px}
.notice-icon svg{width:18px;height:18px;stroke:var(--amber)}
.notice-title{font-size:13px;font-weight:700;margin-bottom:3px}
.notice-desc{font-size:12px;color:var(--text2);line-height:1.5}
.notice-link{background:none;border:none;color:var(--amber);font-size:12px;font-weight:700;font-family:inherit;cursor:pointer;padding:0;margin-top:6px;display:block;text-decoration:underline}
.eval-meta-card{background:var(--surface2);border:1px solid var(--border);border-radius:var(--radius-sm);padding:14px 16px;margin-bottom:12px;text-align:center}
.eval-meta-title{font-size:14px;font-weight:700;margin-bottom:8px}
.eval-meta-tags{display:flex;flex-wrap:wrap;gap:6px;justify-content:center}
.eval-meta-tag{font-size:12px;font-weight:600;color:var(--indigo);background:var(--indigo-bg);border-radius:20px;padding:4px 10px}
.grade-hero{border-radius:var(--radius);padding:28px 20px;text-align:center;margin-bottom:14px;border:1.5px solid}
.grade-letter{font-size:72px;font-weight:800;line-height:1;letter-spacing:-2px}
.grade-pts{font-size:22px;font-weight:700;margin-top:4px}
.grade-pts-max{font-size:13px;color:var(--text3)}
.grade-summary{font-size:14px;color:var(--text2);line-height:1.65;margin-top:12px}
.score-card{padding:14px 16px}
.score-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:8px}
.score-label-text{font-size:14px;font-weight:600}
.score-pts{font-size:18px;font-weight:800}
.score-pts-max{font-size:12px;font-weight:500;color:var(--text3)}
.score-bar-bg{height:6px;background:var(--bg);border-radius:3px;overflow:hidden;margin-bottom:8px}
.score-bar-fill{height:100%;border-radius:3px;transition:width 1s ease}
.score-reason-text{font-size:13px;color:var(--text2);line-height:1.5}
.insight-item{display:flex;gap:10px;align-items:flex-start;padding:12px 0;font-size:14px;line-height:1.55}
.insight-icon svg{width:16px;height:16px;flex-shrink:0}
.insight-divider{height:1px;background:var(--border)}

/* DRAFT / CASES */
.draft-name{font-size:22px;font-weight:800;letter-spacing:-0.5px;margin-bottom:3px}
.draft-liner{font-size:14px;color:var(--green);font-weight:600;font-style:italic;margin-bottom:16px}
.draft-kv{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.draft-k{font-size:11px;font-weight:700;color:var(--text3);text-transform:uppercase;min-width:36px;flex-shrink:0;margin-top:2px}
.draft-v{font-size:14px;color:var(--text2);line-height:1.5}
.draft-plan-row{display:flex;gap:12px;align-items:flex-start;margin-bottom:10px}
.draft-month{font-size:11px;font-weight:700;color:var(--green);min-width:52px;flex-shrink:0;margin-top:2px}
.case-card{background:var(--surface);border:1px solid var(--border);border-radius:var(--radius);padding:16px;margin-bottom:12px;box-shadow:var(--shadow-sm);border-left:4px solid transparent}
.case-card.success{border-left-color:var(--green)}
.case-card.fail{border-left-color:var(--danger)}
.case-top{display:flex;justify-content:space-between;align-items:flex-start;gap:8px;margin-bottom:10px}
.case-name{font-size:15px;font-weight:700}
.case-pills{display:flex;gap:4px;flex-shrink:0}
.case-row{font-size:13px;color:var(--text2);margin-bottom:7px;line-height:1.5;display:flex;gap:6px}
.case-key{font-weight:700;color:var(--text);flex-shrink:0}
.case-insight{font-size:13px;font-weight:600;color:var(--green2);background:var(--green-bg);border-radius:var(--radius-xs);padding:9px 12px;margin-top:10px;line-height:1.5}

/* SETTINGS */
.profile-card{display:flex;align-items:center;gap:14px}
.avatar-circle{width:50px;height:50px;border-radius:50%;background:linear-gradient(135deg,var(--green),var(--indigo));color:#fff;font-size:20px;font-weight:800;display:flex;align-items:center;justify-content:center;flex-shrink:0}
.profile-name{font-size:16px;font-weight:700}
.logout-btn{margin-left:auto;background:var(--bg);border:1.5px solid var(--border2);border-radius:var(--radius-xs);padding:8px 14px;font-size:13px;font-weight:600;font-family:inherit;color:var(--text2);cursor:pointer;flex-shrink:0;display:flex;align-items:center;gap:5px}
.logout-btn svg{width:13px;height:13px;stroke:var(--text2)}
.profile-hint{font-size:13px;color:var(--text3);line-height:1.55;margin-bottom:16px}
.danger-notice{font-size:12px;color:var(--text3);text-align:center;margin-top:8px}

/* EMPTY / ERROR */
.empty-state{text-align:center;padding:56px 24px}
.empty-icon{width:72px;height:72px;border-radius:20px;background:var(--surface2);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;margin:0 auto 18px}
.empty-icon svg{width:32px;height:32px;stroke:var(--text3)}
.empty-title{font-size:17px;font-weight:700;margin-bottom:8px}
.empty-desc{font-size:14px;color:var(--text3);line-height:1.65}
.empty-btn{display:inline-flex;align-items:center;gap:6px;background:var(--green);color:#fff;border:none;border-radius:var(--radius-sm);padding:12px 24px;font-size:14px;font-weight:700;font-family:inherit;cursor:pointer;margin-top:20px}
.empty-btn svg{width:14px;height:14px;stroke:#fff}
.error-state{text-align:center;padding:20px 16px}
.error-state svg{width:28px;height:28px;stroke:var(--danger);display:block;margin:0 auto 8px}
.error-msg{font-size:14px;font-weight:600;color:var(--danger)}

/* TOAST */
.toast{position:fixed;bottom:28px;left:50%;transform:translateX(-50%) translateY(16px);background:var(--text);color:#fff;padding:11px 20px;border-radius:24px;font-size:14px;font-weight:600;z-index:9999;opacity:0;transition:all 0.25s;white-space:nowrap;max-width:90vw;display:flex;align-items:center;gap:7px;box-shadow:var(--shadow);pointer-events:none}
.toast svg{width:15px;height:15px;stroke:currentColor}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0)}
.toast.err{background:var(--danger)}
.ml-divider{height:1px;background:var(--border);margin:16px 0}
.mt-8{margin-top:8px}.mt-12{margin-top:12px}.mt-16{margin-top:16px}.mt-20{margin-top:20px}.mt-24{margin-top:24px}.mb-12{margin-bottom:12px}

@media(min-width:480px){body{background:#E8EAF0}.screen{max-width:480px;margin:0 auto;box-shadow:var(--shadow)}}
@media(orientation:landscape) and (max-height:500px){.ob-icon-wrap{width:72px;height:72px;margin-bottom:20px}.ob-title{font-size:22px}.page-hero{margin-bottom:14px}.hero-title{font-size:22px}.ml-card{padding:14px}}
</style>

firebase.initializeApp({

// ── STATE ─────────────────────────────────────────
let currentUser=null, userProfile=null, currentAnalysis=null, radarChart=null, obStep=0;

// ── ONBOARDING ────────────────────────────────────
const obSlides=[
  {icon:IC.search, title:'상품을 보는 눈이\n달라집니다', desc:'편의점 삼각김밥, 스타벅스 커피, 배달앱…\n일상의 모든 것이 사업 아이디어가 됩니다'},

  {icon:IC.dollar, title:'기회를 발견하고\n사업으로 만드세요', desc:'실현가능성 평가부터 사업 초안까지\n돈 버는 생각을 실행으로'}
];

function renderOb(){
  const s=obSlides[obStep];
  document.getElementById('obIconWrap').innerHTML=`<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="width:48px;height:48px;stroke:var(--green)">${s.icon.match(/<svg[^>]*>(.*)<\/svg>/s)?.[1]||''}</svg>`;
  document.getElementById('obTitle').innerHTML=s.title.replace('\n','<br>');
  document.getElementById('obDesc').innerHTML=s.desc.replace('\n','<br>');
  document.getElementById('obDots').innerHTML=obSlides.map((_,i)=>`<div class="ob-dot${i===obStep?' active':''}"></div>`).join('');
  document.getElementById('obNextBtn').textContent=obStep<obSlides.length-1?'다음':'시작하기';
  document.getElementById('obSkip').style.visibility=obStep<obSlides.length-1?'visible':'hidden';
}
document.getElementById('obNextBtn').addEventListener('click',()=>{
  if(obStep<obSlides.length-1){obStep++;renderOb();}else showAuth('login');
});
document.getElementById('obSkip').addEventListener('click',()=>showAuth('login'));
renderOb();

// ── SCREENS ───────────────────────────────────────
function showScreen(name){
  document.querySelectorAll('.screen').forEach(s=>s.classList.remove('active'));
  document.getElementById(name+'Screen').classList.add('active');
}
function showAuth(mode){showScreen('auth');mode==='login'?renderLogin():renderSignup();}

// ── AUTH ──────────────────────────────────────────
function logoHtml(){
  return `<div class="auth-logo-wrap"><div class="auth-logo-icon">${IC.search}</div><span class="auth-brand">MoneyLens</span></div>`;
}
function renderLogin(){
  document.getElementById('authWrap').innerHTML=`
    ${logoHtml()}
    <h1 class="auth-heading">로그인</h1>
    <p class="auth-sub">돈 버는 생각을 시작하세요</p>
    <div class="form-group"><label class="form-label">이메일</label>
      <input type="email" id="loginEmail" class="ml-input" placeholder="이메일을 입력하세요" autocomplete="email"></div>
    <div class="form-group"><label class="form-label">비밀번호</label>
      <input type="password" id="loginPw" class="ml-input" placeholder="비밀번호를 입력하세요" autocomplete="current-password"></div>
    <div id="loginError" class="auth-error"></div>
    <button class="btn-primary" id="loginBtn">로그인</button>
    <button class="btn-ghost" id="goSignupBtn">처음 오셨나요? 회원가입</button>`;
  document.getElementById('loginBtn').addEventListener('click',doLogin);
  document.getElementById('loginEmail').addEventListener('keydown',e=>{if(e.key==='Enter')document.getElementById('loginPw').focus();});
  document.getElementById('loginPw').addEventListener('keydown',e=>{if(e.key==='Enter')doLogin();});
  document.getElementById('goSignupBtn').addEventListener('click',()=>renderSignup());
}
function renderSignup(){
  document.getElementById('authWrap').innerHTML=`
    <button class="back-link" id="backBtn">${IC.back} 로그인으로 돌아가기</button>
    ${logoHtml()}
    <h1 class="auth-heading">회원가입</h1>
    <p class="auth-sub">계정을 만들어 시작하세요</p>
    <div class="form-group"><label class="form-label">이름</label>
      <input type="text" id="signupName" class="ml-input" placeholder="이름을 입력하세요"></div>
    <div class="form-group"><label class="form-label">이메일</label>
      <input type="email" id="signupEmail" class="ml-input" placeholder="이메일을 입력하세요" autocomplete="email"></div>
    <div class="form-group"><label class="form-label">비밀번호</label>
      <input type="password" id="signupPw" class="ml-input" placeholder="6자 이상 입력하세요" autocomplete="new-password"></div>
    <div id="signupError" class="auth-error"></div>
    <button class="btn-primary" id="signupBtn">회원가입</button>`;
  document.getElementById('backBtn').addEventListener('click',()=>renderLogin());
  document.getElementById('signupBtn').addEventListener('click',doSignup);
  document.getElementById('signupPw').addEventListener('keydown',e=>{if(e.key==='Enter')doSignup();});
}
function showAuthErr(id,msg){const el=document.getElementById(id);if(el){el.textContent=msg;el.style.display='block';}}
function doLogin(){
  const email=(document.getElementById('loginEmail')?.value||'').trim();
  const pw=document.getElementById('loginPw')?.value||'';
  if(!email||!pw){showAuthErr('loginError','이메일과 비밀번호를 입력해주세요');return;}
  auth.signInWithEmailAndPassword(email,pw).catch(e=>{
    showAuthErr('loginError',
      (e.code==='auth/invalid-credential'||e.code==='auth/wrong-password'||e.code==='auth/user-not-found')
        ?'이메일 또는 비밀번호가 올바르지 않습니다':'로그인 실패: '+e.message);
  });
}
function doSignup(){
  const name=(document.getElementById('signupName')?.value||'').trim();
  const email=(document.getElementById('signupEmail')?.value||'').trim();
  const pw=document.getElementById('signupPw')?.value||'';
  if(!name||!email||!pw){showAuthErr('signupError','모든 항목을 입력해주세요');return;}
  if(pw.length<6){showAuthErr('signupError','비밀번호는 6자 이상이어야 합니다');return;}
  auth.createUserWithEmailAndPassword(email,pw)
    .then(c=>c.user.updateProfile({displayName:name}))
    .catch(e=>showAuthErr('signupError',
      e.code==='auth/email-already-in-use'?'이미 사용 중인 이메일입니다':
      e.code==='auth/invalid-email'?'이메일 형식이 올바르지 않습니다':'회원가입 실패: '+e.message));
}
auth.onAuthStateChanged(async user=>{
  currentUser=user;
  if(user){showScreen('app');await loadProfile();goPage('lens');}
  else showScreen('onboarding');
});

// ── PROFILE ───────────────────────────────────────
async function loadProfile(){
  try{const s=await db.collection(`users/${currentUser.uid}/profile`).get();
    userProfile=s.empty?null:s.docs[0].data();}catch{userProfile=null;}
}
async function saveProfile(data){
  try{const s=await db.collection(`users/${currentUser.uid}/profile`).get();
    if(!s.empty)await s.docs[0].ref.update(data);
    else await db.collection(`users/${currentUser.uid}/profile`).add(data);
    userProfile=data;showToast('프로필이 저장됐습니다');}
  catch(e){showToast('저장 실패: '+e.message,true);}
}

// ── NAV ───────────────────────────────────────────
document.getElementById('topTabs').addEventListener('click',e=>{
  const btn=e.target.closest('.top-tab');if(btn)goPage(btn.dataset.page);
});
function goPage(page){
  document.querySelectorAll('.top-tab').forEach(b=>b.classList.toggle('active',b.dataset.page===page));
  const main=document.getElementById('mainContent');
  main.scrollTop=0;
  ({lens:renderLens,ideas:renderIdeas,eval:renderEval,cases:renderCases,settings:renderSettings}[page]||renderLens)(main);
}

// ── PROMPT HELPERS ────────────────────────────────
function profileCtxStr(){
  return userProfile?`\n\n[내 프로필]\n- 역량: ${userProfile.skills||'미입력'}\n- 자본: ${userProfile.capital||'미입력'}\n- 관심산업: ${userProfile.industry||'미입력'}\n- 가용시간: ${userProfile.time||'미입력'}`:'';
}
function copyText(text,successMsg){
  const fallback=()=>{
    const ta=document.createElement('textarea');
    ta.value=text;ta.style.cssText='position:fixed;opacity:0;top:0;left:0';
    document.body.appendChild(ta);ta.focus();ta.select();
    try{document.execCommand('copy');}catch{}
    document.body.removeChild(ta);
  };
  if(navigator.clipboard&&window.isSecureContext){
    navigator.clipboard.writeText(text).then(()=>showToast(successMsg)).catch(()=>{fallback();showToast(successMsg);});
  }else{fallback();showToast(successMsg);}
}

function buildPrompt(input,type){
  return `당신은 비즈니스 역공학(reverse engineering) 전문가입니다.

추정값은 ✅확인됨 / ⚠️추정 / ❓불확실 로 표기해주세요.

[분석 대상]
${type==='url'?'URL: ':''}${input}
${profileCtxStr()}

아래 6가지 항목을 순서대로 분석해주세요:

1. 📋 상품 개요
(무엇인가, 왜 만들어졌나 - 2~3문장)

2. 🏭 생산 구조
(어디서 어떻게 만들어지나, 원가 추정 - 신뢰도 표기)

3. 🚚 유통 경로
(제조→도매→소매 구조, 각 단계 마진 추정)

4. 📊 시장 규모
(국내/글로벌 추정)

5. 💡 기회 포인트
(개선/틈새/사업 기회 3가지를 각각 한 줄로)

6. 💰 돈 되는 아이디어 3가지
각 아이디어마다:
- 아이디어명:
- 설명: (2~3문장)
- 수익 모델:`;
}

function parseAnalysis(raw){
  const get=(rx)=>{const m=raw.match(rx);return m?m[1].trim():''};
  const overview=get(/1\.\s*📋[^\n]*\n([\s\S]*?)(?=2\.|$)/);
  const production=get(/2\.\s*🏭[^\n]*\n([\s\S]*?)(?=3\.|$)/);
  const distribution=get(/3\.\s*🚚[^\n]*\n([\s\S]*?)(?=4\.|$)/);
  const market=get(/4\.\s*📊[^\n]*\n([\s\S]*?)(?=5\.|$)/);
  const oppRaw=get(/5\.\s*💡[^\n]*\n([\s\S]*?)(?=6\.|$)/);
  const opportunities=oppRaw.split('\n').map(l=>l.replace(/^[-•*\d.]+\s*/,'').trim()).filter(l=>l.length>5).slice(0,3);
  const ideaRaw=get(/6\.\s*💰[^\n]*\n([\s\S]*?)$/);
  const ideas=[];
  if(ideaRaw){
    const blocks=ideaRaw.split(/(?=아이디어명[：:])/);
    blocks.forEach(b=>{
      const t=b.match(/아이디어명[：:]\s*([^\n]+)/);
      const d=b.match(/설명[：:]\s*([\s\S]*?)(?=수익 모델|$)/);
      const r=b.match(/수익 모델[：:]\s*([^\n]+)/);
      if(t)ideas.push({title:t[1].trim(),description:d?d[1].trim():'',revenueModel:r?r[1].trim():''});
    });
  }
  return {productName:currentAnalysis?.inputContent||'분석 결과',overview,production,distribution,market,opportunities,ideas,reliabilityNote:'AI가 제공한 분석 결과입니다. 중요한 의사결정 전 수치를 검증해주세요.',rawText:raw};
}

    <div id="evalPasteArea" style="display:none">
      <div class="section-label mt-16">${IC.copy} AI 평가 결과 붙여넣기</div>
      ${pasteAreaHtml('evalPasteInput','saveEvalBtn','평가 결과 저장하기','AI 평가 결과를 여기에 붙여넣어 주세요...')}
    </div>
    <div id="evalDisplayResult"></div>`;

  main.querySelector('#goSetBtn')?.addEventListener('click',()=>goPage('settings'));
  main.querySelector('#copyEvalBtn')?.addEventListener('click',()=>{
    const prompt=`당신은 비즈니스 아이디어 실현가능성 평가 전문가입니다.\n\n[분석 대상]: ${currentAnalysis.productName||''}\n[개요]: ${currentAnalysis.overview||''}\n[기회 포인트]: ${(currentAnalysis.opportunities||[]).join(', ')}${profileCtxStr()}\n\n아래 형식으로 평가해주세요:\n\n## 실현가능성 평가\n\n**종합 등급**: S/A/B/C 중 하나 (S:90↑ A:75↑ B:60↑ C:60↓)\n**총점**: 00점 / 100점\n\n### 항목별 점수 (각 20점 만점)\n1. 시장성: 00점 - (이유)\n2. 실행 난이도: 00점 - (이유)\n3. 초기 자본: 00점 - (이유)\n4. 경쟁 강도: 00점 - (이유)\n5. 나의 적합도: 00점 - (이유)\n\n### 종합 평가\n(2~3문장)\n\n### 강점\n(가장 유리한 점)\n\n### 약점\n(가장 보완해야 할 점)\n\n### 첫 번째 실행 액션\n(당장 할 수 있는 구체적 액션 1가지)`;
    copyText(prompt,'평가 프롬프트 복사됨! AI에 붙여넣어 주세요');
    document.getElementById('evalPasteArea').style.display='block';
    const evalAi=document.createElement('div');
    evalAi.style.cssText='margin-top:8px';
    evalAi.innerHTML=aiLinksHtml();
    document.querySelector('#copyEvalBtn').after(evalAi);
  });
  main.querySelector('#saveEvalBtn')?.addEventListener('click',()=>{
    const raw=(document.getElementById('evalPasteInput')?.value||'').trim();
    if(!raw){showToast('AI 평가 결과를 붙여넣어 주세요',true);return;}
    const gradeM=raw.match(/종합 등급[^\n]*?([SABC])/);
    const totalM=raw.match(/총점[^\n]*?(\d+)/);
    const grade=gradeM?gradeM[1]:'B';
    const total=totalM?parseInt(totalM[1]):0;
    const gc={S:'#05C072',A:'#4CAF50',B:'#F59E0B',C:'#EF4444'}[grade]||'#05C072';
    document.getElementById('evalDisplayResult').innerHTML=`
      <div class="grade-hero mt-16" style="border-color:${gc}30;background:${gc}08">
        <div class="grade-letter" style="color:${gc}">${grade}</div>
        <div class="grade-pts" style="color:${gc}">${total}점 <span class="grade-pts-max">/ 100점</span></div>
      </div>
      <div class="ml-card mt-12"><div class="card-eyebrow">${IC.book}AI 평가 전문</div><div class="card-body" style="white-space:pre-wrap;font-size:13px;line-height:1.7">${raw}</div></div>
      <div class="btn-row mt-16">
        <button class="btn-full" id="draftBtn">사업 초안 생성</button>
        <button class="btn-full secondary" id="casesBtn">유사 사례 탐구</button>
      </div>
      <div id="draftResult"></div>`;
    document.getElementById('draftBtn').addEventListener('click',copyDraftPrompt);
    document.getElementById('casesBtn').addEventListener('click',()=>goPage('cases'));
    showToast('평가 결과가 저장됐습니다 ✅');
    document.getElementById('evalPasteArea').style.display='none';
    if(currentUser&&currentAnalysis?.id){
      db.collection(`users/${currentUser.uid}/evaluations`).add({analysisId:currentAnalysis.id,productName:currentAnalysis.productName,grade,total,rawText:raw,createdAt:firebase.firestore.FieldValue.serverTimestamp()}).catch(()=>{});
      db.collection(`users/${currentUser.uid}/analyses`).doc(currentAnalysis.id).update({evaluated:true}).catch(()=>{});
    }
  });
}

function copyDraftPrompt(){
  const prompt=`당신은 1페이지 사업 초안 작성 전문가입니다.\n\n[상품/서비스]: ${currentAnalysis?.productName||''}\n[기회 포인트]: ${(currentAnalysis?.opportunities||[]).join(', ')}\n[아이디어]: ${(currentAnalysis?.ideas||[]).map(i=>i?.title||'').join(', ')}\n\n아래 형식으로 작성해주세요:\n\n## 사업 초안\n\n**사업명**: \n**한줄 정의**: ""\n\n---\n- 타깃 고객:\n- 핵심 가치:\n- 수익 모델:\n- 예상 초기 투자금:\n\n---\n### 첫 90일 실행 계획\n- 1개월차:\n- 2개월차:\n- 3개월차:`;
  copyText(prompt,'사업 초안 프롬프트 복사됨!');
  const draftDiv=document.getElementById('draftResult');
  if(draftDiv){
    draftDiv.innerHTML=`<div class="ml-card mt-12">${aiLinksHtml()}<textarea id="draftPasteInput" class="ml-textarea mt-12" style="min-height:140px" placeholder="AI가 작성한 사업 초안을 붙여넣어 주세요..."></textarea><button class="btn-full secondary mt-12" id="saveDraftBtn">${IC.save}초안 저장하기</button><div id="draftSaved"></div></div>`;
    draftDiv.querySelector('#saveDraftBtn')?.addEventListener('click',()=>{
      const raw=(document.getElementById('draftPasteInput')?.value||'').trim();
      if(!raw){showToast('초안을 붙여넣어 주세요',true);return;}
      document.getElementById('draftSaved').innerHTML=`<div class="ml-card accent mt-12"><div class="card-eyebrow">저장된 사업 초안</div><div class="card-body" style="white-space:pre-wrap;font-size:13px;line-height:1.7">${raw}</div></div>`;
      showToast('사업 초안이 저장됐습니다 ✅');
    });
  }
}

// ── CASES ─────────────────────────────────────────
function renderCases(main){
  if(!currentAnalysis){
    main.innerHTML=`<div class="page-hero"><div class="hero-badge">${IC.book}사례탐구</div><h1 class="hero-title">유사 사례</h1></div>
      <div class="empty-state"><div class="empty-icon">${IC.book}</div><div class="empty-title">분석된 상품이 없습니다</div><div class="empty-desc">렌즈에서 상품을 분석하면<br>유사 사례를 탐구할 수 있습니다</div><button class="empty-btn" id="toLensBtn2">${IC.search}렌즈로 이동</button></div>`;
    main.querySelector('#toLensBtn2')?.addEventListener('click',()=>goPage('lens'));return;
  }
  main.innerHTML=`
    <div class="page-hero"><div class="hero-badge">${IC.book}사례탐구</div><h1 class="hero-title">유사 사례</h1></div>
    <div class="selected-bar">${IC.book}<div class="selected-bar-inner"><div class="selected-label">분석 대상</div><div class="selected-name">${currentAnalysis.productName||currentAnalysis.inputContent||'분석 결과'}</div></div></div>
    <button class="btn-full" id="copyCasesBtn">${IC.copy} 사례탐구 프롬프트 복사하기</button>
    <div id="casesPasteArea" style="display:none">
      <div class="section-label mt-16">${IC.copy} AI 사례 결과 붙여넣기</div>
      ${pasteAreaHtml('casesPasteInput','saveCasesBtn','사례 저장하기','AI가 찾은 사례를 여기에 붙여넣어 주세요...')}
    </div>
    <div id="casesResult"></div>`;

  main.querySelector('#copyCasesBtn')?.addEventListener('click',()=>{
    const prompt=`당신은 비즈니스 사례 전문가입니다.\n아래와 관련된 국내외 성공/실패 사례를 4~5개 찾아주세요.\n\n[분석 대상]: ${currentAnalysis.productName||''}\n[기회 포인트]: ${(currentAnalysis.opportunities||[]).join(', ')}\n[아이디어]: ${(currentAnalysis.ideas||[]).map(i=>i?.title||'').join(', ')}\n\n각 사례를 아래 형식으로 작성해주세요:\n\n### 사례 N: [회사/서비스명] (국내/해외 · 성공/실패)\n- 핵심 전략:\n- 성공/실패 이유:\n- 💡 내 아이디어에 주는 시사점:`;
    copyText(prompt,'사례탐구 프롬프트 복사됨!');
    document.getElementById('casesPasteArea').style.display='block';
    const ai=document.createElement('div');ai.style.cssText='margin-top:8px';ai.innerHTML=aiLinksHtml();
    document.querySelector('#copyCasesBtn').after(ai);
  });
  main.querySelector('#saveCasesBtn')?.addEventListener('click',()=>{
    const raw=(document.getElementById('casesPasteInput')?.value||'').trim();
    if(!raw){showToast('사례를 붙여넣어 주세요',true);return;}
    document.getElementById('casesResult').innerHTML=`<div class="ml-card accent mt-12"><div class="card-eyebrow">${IC.book}저장된 사례</div><div class="card-body" style="white-space:pre-wrap;font-size:13px;line-height:1.7">${raw}</div></div>`;
    document.getElementById('casesPasteArea').style.display='none';
    showToast('사례가 저장됐습니다 ✅');
  });
}

// ── SETTINGS ──────────────────────────────────────
function renderSettings(main){
  const p=userProfile||{};
  const name=currentUser?.displayName||currentUser?.email?.split('@')[0]||'사용자';
  const email=currentUser?.email||'';
  main.innerHTML=`
    <div class="page-hero"><div class="hero-badge">${IC.user}설정</div><h1 class="hero-title">내 계정</h1></div>
    <div class="ml-card"><div class="profile-card">
      <div class="avatar-circle">${name.charAt(0).toUpperCase()}</div>
      <div style="flex:1;min-width:0"><div class="profile-name">${name}</div><div style="font-size:13px;color:var(--text3);overflow:hidden;text-overflow:ellipsis;white-space:nowrap">${email}</div></div>
      <button class="logout-btn" id="logoutBtn">${IC.logout}로그아웃</button>
    </div></div>
    <div class="section-label mt-24">${IC.user}내 프로필</div>
    <div class="ml-card">
      <div class="profile-hint">입력할수록 평가실이 나에게 맞게 조정됩니다</div>
      <div class="form-group"><label class="form-label">보유 역량 · 전문성</label><input type="text" id="pSkills" class="ml-input-field" value="${p.skills||''}" placeholder="예) 마케팅, 교육, IT, 영업, 기획..."></div>
      <div class="form-group mt-12"><label class="form-label">가용 초기 자본</label>
        <select id="pCapital" class="ml-input-field"><option value="">선택해주세요</option>${['100만원 미만','100~500만원','500만~1천만원','1천만~5천만원','5천만원 이상'].map(v=>`<option value="${v}"${p.capital===v?' selected':''}>${v}</option>`).join('')}</select>
      </div>
      <div class="form-group mt-12"><label class="form-label">주당 가용 시간</label>
        <select id="pTime" class="ml-input-field"><option value="">선택해주세요</option>${['5시간 미만 (부업)','5~15시간 (사이드프로젝트)','15~30시간 (병행창업)','풀타임 (전업)'].map(v=>`<option value="${v}"${p.time===v?' selected':''}>${v}</option>`).join('')}</select>
      </div>
      <div class="form-group mt-12"><label class="form-label">관심 산업</label><input type="text" id="pIndustry" class="ml-input-field" value="${p.industry||''}" placeholder="예) 식품, 교육, IT, 커머스, 콘텐츠..."></div>
      <button class="btn-full mt-16" id="saveProfileBtn">${IC.save}프로필 저장</button>
    </div>
    <div class="section-label mt-24">${IC.trash}데이터 관리</div>
    <div class="ml-card">
      <button class="btn-full danger-btn" id="deleteAllBtn">${IC.trash}전체 데이터 삭제</button>
      <div class="danger-notice">삭제된 데이터는 복구할 수 없습니다</div>
    </div>`;

  main.querySelector('#logoutBtn')?.addEventListener('click',async()=>{if(!confirm('로그아웃 하시겠습니까?'))return;await auth.signOut();});
  main.querySelector('#saveProfileBtn')?.addEventListener('click',async()=>{
    await saveProfile({skills:document.getElementById('pSkills')?.value||'',capital:document.getElementById('pCapital')?.value||'',time:document.getElementById('pTime')?.value||'',industry:document.getElementById('pIndustry')?.value||''});
  });
  main.querySelector('#deleteAllBtn')?.addEventListener('click',async()=>{
    if(!confirm('모든 분석 데이터를 삭제합니다. 계속하시겠습니까?'))return;
    try{
      const s1=await db.collection(`users/${currentUser.uid}/analyses`).get();for(const d of s1.docs)await d.ref.delete();
      const s2=await db.collection(`users/${currentUser.uid}/evaluations`).get();for(const d of s2.docs)await d.ref.delete();
      showToast('모든 데이터가 삭제됐습니다');
    }catch(e){showToast('삭제 실패',true);}
  });
}

// ── UTILS ─────────────────────────────────────────
function fmtDate(ts){if(!ts)return'';const d=ts.toDate?ts.toDate():new Date(ts);return d.toLocaleDateString('ko-KR',{month:'short',day:'numeric'});}
function showToast(msg,isErr=false){
  const t=document.createElement('div');
  t.className='toast'+(isErr?' err':'');
  t.innerHTML=(isErr?IC.x:IC.check)+msg;
  document.body.appendChild(t);
  requestAnimationFrame(()=>t.classList.add('show'));
  setTimeout(()=>{t.classList.remove('show');setTimeout(()=>t.remove(),300);},2500);
}
</script>
